<script>
const CHARS={snape:{n:"西弗勒斯·斯内普",h:"斯莱特林",hc:"house-s",g:"male",s:{"loyalty": 3, "depth": 3, "bravery": 2, "rebel": 1, "humor": 0, "adventure": 1, "morals": 2, "wisdom": 2},t:["深沉隐忍", "极致忠诚", "为爱牺牲", "永远被误解"],r:"你拥有和他一样的深度——不轻易表露情感，但一旦给出就是全部。你们之间的默契建立在\"不说也懂\"的基础上。",tt:"《三圈半》",tb:"你第一次意识到西弗勒斯·斯内普在注意你，是在地下教室的魔药课上。\n\n那是一节关于缓和剂的课程。全班同学都在紧张地盯着自己的坩埚，纳威的药水又不出意外地变成了错误的颜色——一种令人不安的橙褐色，正在发出微弱的嘶嘶声。有几个斯莱特林的学生窃笑起来，连格兰芬多的那边也传来了几声压抑的嗤笑。斯内普教授没有理会那些笑声，他正沿着过道缓慢地巡视，黑色的长袍在石板上无声地滑过。\n\n他走到了你的桌前。\n\n你没有抬头，依然专注地盯着自己坩埚里的银紫色液体。它正在按照课本上的描述，冒出细小的蒸汽。但你心里知道，有一点点不对劲——蒸汽的频率比预期的快了一些。这意味着温度可能偏高，或者搅拌的力度不够均匀。\n\n「顺时针，」他的声音从你头顶传来，低沉而平稳，「三圈半。」\n\n你愣了一下，抬起眼睛看他。他站在那里，居高临下地看着你的坩埚，黑色的眼睛深得像地窖本身。他没有说别的——没有像对纳威那样嘲讽，也没有像对赫敏那样勉强表扬——只是说了那三个字：三圈半。\n\n你照做了。用银勺在坩埚里顺时针搅拌，一圈、两圈、三圈，然后在第四圈的中途停下来。就在停下来的那一瞬间，坩埚里的液体发生了奇妙的变化——从浑浊的银紫色变成了完全清澈的淡金色，像被阳光穿透的蜂蜜。全班只有你的药水变成了这个颜色。\n\n斯内普教授看了一眼你的坩埚。你注意到他的嘴角极其轻微地动了一下——不是笑，但也不是他平时那种永远不满意的神情。然后他什么也没说，转身走向了下一个学生。\n\n但你知道，在那个所有人都忙着嘲笑纳威的下午，他是唯一一个注意到你差了那半圈的人。\n\n——\n\n从那之后，你开始注意到一些以前从未注意到的事情。\n\n比如他批改论文时会在你的羊皮纸上留下比其他人更详细的批注——不是那种敷衍的「及格」或「有待改进」，而是具体的、有针对性的意见，比如「月长石粉末的用量可以再减少零点五克，效果会更好」或者「你的论证逻辑很清晰，但关于狼毒药剂的部分，建议参考《高级魔药制备》第二百三十七页的第三段落」。\n\n比如他在课堂提问时，偶尔会把最简单的问题留给纳威，把最难的问题留给你——不是刁难，而是一种不动声色的认可，仿佛他知道你能回答上来，所以不需要给你任何铺垫。\n\n比如有一次你在走廊里差点和一个跑过来的一年级学生相撞，他恰好从另一个方向走来，一只手不动声色地扶了一下那个学生的后背，另一只手——在你还没反应过来的时候——轻轻按了一下你的肩膀，帮你稳住了平衡。他的动作快得几乎让人以为那是错觉。\n\n你开始觉得，也许西弗勒斯·斯内普并不像所有人说的那样——冰冷、刻薄、没有感情。也许他只是把那些感情藏得很深，深到只有非常非常仔细的人才能发现。\n\n——\n\n五年级那年的一个周三晚上，你在禁书区遇到了他。\n\n那天晚上你原本是为了查阅一篇关于古代如尼文的论文才来到这里的。禁书区一如既往地昏暗，唯一的光源是墙上每隔几步就挂着的一盏发出微弱黄光的魔法壁灯。空气里弥漫着旧羊皮纸和灰尘的味道。\n\n你拐过最后一个书架，然后看到了他。\n\n他坐在禁书区最里面那张橡木桌子旁，面前摊着一本厚重的、书脊已经严重磨损的旧书。他的羽毛笔在一张羊皮纸上快速移动着，神情专注得像是整个世界都不存在。桌上放着一杯已经凉透了的茶。\n\n你犹豫了一下，不知道该不该转身离开。但就在这时，他抬起了头。\n\n他的目光和你撞在了一起。\n\n「教授，」你先开口了，声音在安静的禁书区里显得格外清晰，「我只是来查一点如尼文的资料。」\n\n他看了你两秒钟，然后微微点了点头。「坐吧。」他说。\n\n你犹豫了一下，然后在对面的椅子上坐了下来。你从书包里取出自己的论文材料，但注意力始终无法集中在那些如尼文字符上。你忍不住一次又一次地抬起头，观察对面这个在所有学生眼里如同噩梦般的男人。\n\n他工作的样子和在课堂上完全不同。没有那种咄咄逼人的压迫感，没有那种随时准备挑出学生错误的锐利。此刻的他只是安静地坐在那里，沉浸在自己的研究中。偶尔他会停下来，用羽毛笔的末端轻轻敲一下自己的下巴，然后继续在书上寻找什么。\n\n你做了一个决定。\n\n你从书包里取出一个保温瓶——那是你从厨房的家养小精灵那里要来的，里面装的是刚煮好的甘菊茶——然后倒了一杯，轻轻放在他的桌子对面。\n\n他停下笔，看着那杯茶，又看了看你。\n\n「你总是知道什么时候不该说话。」他说。声音很低，几乎像是在自言自语。\n\n「因为我知道什么时候说话没有用。」你回答。\n\n他沉默了几秒钟。然后他端起那杯茶，喝了一口。\n\n那天晚上，你们谁也没有再开口。你继续写你的如尼文论文，他继续研究他的旧书。禁书区里只剩下羽毛笔在羊皮纸上划过的沙沙声，以及偶尔从远处走廊传来的脚步声。\n\n但那是你们之间最长的一次「对话」。两句话。但那两句话的分量，比你和很多人说过的所有话加起来都要重。\n\n——\n\n天文塔之夜的三天前，他叫你去了他的办公室。\n\n你到的时候，他正站在窗边，背对着你。窗外是阴沉的灰蓝色天空，远处的黑湖在风中泛着细碎的波纹。房间里弥漫着药草的味道——那是他常用来保存各种魔药材料的干燥气味。\n\n「你接下来有两条路。」他没有转身，声音平静得像是在念一份说明书，「第一条，去圣芒戈。以你的能力，你会成为一名极其优秀的魔药师。这是一条安全的路。大多数人都会建议你选这条路。」\n\n他停了一下。\n\n「第二条，留在这里。」\n\n他的声音里出现了一丝丝不易察觉的变化——不是犹豫，更像是一种他自己都没有意识到的期待。\n\n「第二条路不如第一条安全。也许不如第一条光明。但……」\n\n他没有说完。你不确定是因为他不想说完，还是因为他不知道该怎么说完。\n\n但你听懂了。\n\n「我选第二条。」你说。\n\n他终于转过身来看着你。那是你第一次在他的眼睛里看到某种东西——不是感激，至少不完全是。更像是一种释然，一种紧绷了很久的弦终于松了一点点的释然。但那种神情只出现了一瞬间，很快就被他惯常的冷漠面具覆盖了。\n\n「你确定？」他问。\n\n「我确定。」你回答。\n\n他又沉默了一会儿，然后走回书桌后面，坐下，拿起一份文件，像是你从未存在过一样。但你注意到，他拿文件的那只手，手指比平时松了一些。\n\n「那你可以走了，」他说，「明天还有魔药课。」\n\n你走到门口的时候，他叫住了你。\n\n「那个甘菊茶，」他说，眼睛没有从文件上抬起来，「还不错。」\n\n你转过身，笑了。\n\n——\n\n战争结束了。他活下来了。\n\n你知道这不是理所当然的事。在整个战争期间，他承担了比任何人都重的担子——双面间谍的身份，伏地魔的猜疑，邓布利多的计划，所有那些他必须独自承受的重量。很多次，你都以为他会撑不下去。但每一次，他都撑过来了。\n\n战争结束后的第一个春天，你带了两杯茶去找他。依然是甘菊茶，从厨房的家养小精灵那里要来的，装在同一个保温瓶里。\n\n你敲响了他办公室的门。\n\n他开了门。看到你的时候，他微微愣了一下——也许是他没想到你会来，也许是他没想到你会带着茶来。但那种惊讶很快就消失了，取而代之的是一种你非常熟悉的、近乎于平静的表情。\n\n「你为什么选第二条路？」他终于问了。这是从你选择留在他身边的那一天起，他第一次问出这个问题。\n\n你看着他，看着他那双深得像地窖一样的黑色眼睛，看着他那头因为疏于打理而有些凌乱的黑色头发，看着他身上那件永远不变的、带着药草气味的黑色长袍。\n\n「因为第一条路没有你。」你说，「而你是所有问题里最值得研究的那个。」\n\n他没有立刻回答。他只是站在那里，看着你，沉默了很久很久。然后他做了一件让你完全没有预料到的事——他伸出手，非常轻地、非常自然地，把你的手放在了他的手心里。\n\n他的手很凉，但你的手握上去之后，那种凉意就慢慢开始消散了。\n\n「以后不用再精确到半圈了。」他说，声音低得几乎听不见，「四圈也行。」\n\n你笑了。眼泪毫无预兆地涌了上来，但你忍住了。\n\n你知道那是什么意思。那是西弗勒斯·斯内普用自己的方式在说：你不需要再那么完美了。不需要再那么努力了。有我在，差那么一点点，也没关系。\n\n而你能给他的最好的回答，就是什么也不说，只是站在那里，让他的手握着你的手。\n\n在那个充满药草气味的办公室里，在那扇可以看到黑湖的窗户前，你们就这样站了很久。没有更多的话。也不需要更多的话。\n\n因为从三圈半到四圈之间的那半圈，就是他用了一生才学会的、关于温柔的全部定义。"},sirius:{n:"小天狼星·布莱克",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 3, "depth": 2, "bravery": 3, "rebel": 3, "humor": 2, "adventure": 3, "morals": 2, "wisdom": 1},t:["叛逆自由", "极致浪漫", "忠诚至死", "纯血的背叛者"],r:"你们是天生的冒险搭档——他负责冲动，你负责在关键时刻拉住他。你们的相处就是吵着架、笑着、一起去疯。",tt:"《你欠我一场告别》",tb:"你第一次见到小天狼星·布莱克，是在霍格沃茨特快列车的第三个包厢里。\n\n那天你因为来晚了一步，前面几个包厢都坐满了人。你拎着行李沿着狭窄的过道往里走，透过每一扇半开的门看到里面热络的聊天和欢声笑语。你本来不太在意这些——你习惯了一个人待着，习惯了在角落里安静地看书——但那个下午不知道怎么回事，你忽然很想找一个有人说话的地方坐下来。\n\n然后你推开了第三扇门。\n\n一个男孩抬起头看你。灰色的眼睛，乱成一团的黑发，嘴角带着一种你后来再也忘不掉的、介于坏笑和真诚之间的弧度。他的旁边还坐着一个和你差不多大的男孩——后来你知道那是詹姆·波特——正在滔滔不绝地讲着什么魁地奇的事情。\n\n「坐吧，」小天狼星说，声音里带着一种天生的、毫不费力的热情，「正好要一个人来听这个笑话。波特讲得太烂了，需要有人来拯救这个下午。」\n\n詹姆抗议了一声，但那个笑话你早就听过了——是你表哥去年在家庭聚会上讲过的同一个版本，而且小天狼星讲得确实比詹姆好那么一点点。但你还是笑了。不是因为笑话好笑，是因为他讲笑话时那种全神贯注的样子，好像世界上最重要的事情就是让你笑出来。\n\n你笑了之后，他看起来比自己讲了个好笑话还要开心。\n\n从那天起，你就记住了这个名字——小天狼星·布莱克。\n\n——\n\n之后的日子里，你们在霍格沃茨的交集越来越多。他不是那种会主动找每个人说话的人——他的圈子很小，詹姆、莱姆斯、彼得，再加上偶尔出现的一个两个朋友——但他对你似乎有一种特别的关注。\n\n他会在走廊里碰到你的时候，停下脚步，用那种漫不经心的语气问你最近在忙什么。他会在你路过格兰芬多公共休息室的时候，从里面探出头来，问你要不要进来坐一会儿。他会在图书馆里，坐到你旁边的位置上，什么也不说，只是翻一本书——但你知道他根本没在看，因为那本书已经同一个页面翻了十几分钟了。\n\n你开始习惯了他的存在。\n\n然后到了四年级那年的圣诞舞会。\n\n那天晚上他穿了一身非常正式的黑色长袍，头发比平时整齐了许多——但也只是许多而已，因为那些黑色的卷发还是倔强地翘着几撮。他在礼堂门口拦住了你。\n\n「我知道这听起来很奇怪，」他说，用一种你从未听过的、带着一丝罕见的紧张的语气，「但是……你愿不愿意和我一起去舞会？就是个舞会，别多想。我觉得你会跳得比我好，这样我可以跟着你学。」\n\n你注意到他的手在长袍的口袋里，手指在不停地动。那不是他平时的样子——平时的小天狼星永远是自信的、从容的、好像什么都不在乎的。但此刻的他，站在礼堂门口那盏昏黄的魔法灯光下，看起来像一个等着被宣判的人。\n\n「好。」你说。\n\n他笑了。那个笑容没有收住——是真的开心，不是那种他平时用来掩饰什么的、游刃有余的笑。你看到他的肩膀松了一下，像是放下了一个很重的东西。\n\n那天晚上，在舞会上，他确实跳得不好。但他一直牵着你，一直看着你，一直在你耳边小声讲那些只有你们两个人能听到的笑话。你们跳了一整晚，到最后脚都酸了。\n\n——\n\n毕业前的最后一个夜晚，你们坐在天文塔上。那是霍格沃茨最高的地方，星星多得像是有人抓了一把碎钻撒在了黑色的天鹅绒上。远处的黑湖安静得像一面镜子，映着月光。\n\n他把外套披在你肩上。那是格兰芬多的红色外套，带着他身上的温度。\n\n「如果战争结束了……」他说，声音里带着一种你很少在他身上听到的认真，「我带你去环游世界。先去阿兹卡班门口嘲笑一下——对，就是那个关了我十三年祖先的烂地方，我要站在门口说'你们关得住我，关不住我的好心情'——然后去任何你想去的地方。埃及、法国、或者随便哪个地图上找不到的角落。都行。」\n\n你靠在他的肩上，听着他说那些不着边际的计划。你知道他有一半是在开玩笑，但另一半不是。你更知道，不管他去哪里，你都想跟着。\n\n「好。」你说。\n\n他没有再说话。你感觉到他的手轻轻握了握你的手指——只是握了一下，然后就松开了。但那个动作里包含了太多他平时说不出口的东西。\n\n——\n\n然后一切都变了。\n\n伏地魔回来了。詹姆和莉莉被杀了。小天狼星被冤枉了。十二年的阿兹卡班。\n\n你等了他十三年。\n\n不是因为你还抱有什么希望——理智告诉你，阿兹卡班不是那种能让人活着出来的地方。但你不知道还能做什么。等待，至少是一种姿态。一种对那个在天文塔上对你说「去任何你想去的地方」的人的姿态。\n\n十三年后，他逃出来了。\n\n你是在《预言家日报》上看到的消息——小天狼星·布莱克，最臭名昭著的食死徒之一，从阿兹卡班越狱了。所有人都在恐慌，所有人都在说「他要来找哈利·波特报仇」。只有你知道，他不是那种人。\n\n你们在格里莫广场12号重逢。\n\n他瘦了。老了。脸上多了很多你不认识的皱纹。头发比以前更乱了。但那双灰色的眼睛没有变，那个嘴角的弧度没有变。\n\n「你等了这么久。」他说。\n\n「我没等，」你说，「我只是没走。」\n\n他看着你，很久没有说话。然后他做了一件和十三年的牢狱之苦完全不相称的事——他笑了，那个和特快列车包厢里一模一样的笑。\n\n「你还是这么嘴硬。」他说。\n\n——\n\n但这一次重逢比上一次短暂得多。\n\n神秘事务司之战的前一天晚上，他找到了你。他的表情比平时严肃得多，那种你很少看到的、真正属于一个战士的严肃。\n\n「明天会很危险。」他说。\n\n「我知道。」你回答。\n\n「我不是在征求你的意见。」\n\n「我也不是在给你意见。」\n\n他沉默了一下，然后走上前，握了一下你的手。很紧，很用力，像是生怕一松手就会失去什么。\n\n「等我回来。」他说。\n\n「你欠我一场旅行。」你说，「还有霍格莫德最贵的那家餐厅。别以为我会忘。」\n\n他笑了。但这一次，他的眼睛里多了一点你叫不出名字的东西。后来你知道了，那个东西叫做告别。\n\n——\n\n他没有回来。\n\n你是在战斗结束后的第二天早上，从哈利口中听到的。他说小天狼星是被贝拉特里克斯击中的。他说他倒下去的时候，还在笑。\n\n你坐在格里莫广场12号的那个旧沙发上，手里攥着一张从壁炉台上掉下来的纸条。那是他留下的，不知道是什么时候写的。上面只有一行字，用他那潦草的、永远写不整齐的字迹：\n\n「还欠你一场旅行。还欠你一场告别。等我想好怎么还。」\n\n你把纸条折好，放进口袋里。然后你站起来，走出了格里莫广场。\n\n后来的很多年里，你一个人去了那些他说想带你去的地方。你去了埃及，站在金字塔旁边看着太阳落下去。你去了法国，在塞纳河畔的咖啡馆里坐了一个下午。你去了阿兹卡班，站在海岸边对着大西洋的风说话。\n\n「我替你嘲笑了，」你对着风说，「比你想象的还难看。」\n\n没有人回答你。海浪声一阵一阵地拍打着岩石，像是某种遥远的、断断续续的笑声。\n\n你闭上眼睛，听到了。"},draco:{n:"德拉科·马尔福",h:"斯莱特林",hc:"house-s",g:"male",s:{"loyalty": 2, "depth": 2, "bravery": 1, "rebel": 2, "humor": 1, "adventure": 1, "morals": 1, "wisdom": 2},t:["傲慢外壳", "内心柔软", "孤独", "被迫长大"],r:"你能看到他伪装下的真实——不是高高在上的马尔福少爷，而是一个不知道如何表达\"我需要你\"的人。",tt:"《你知道我在说谎》",tb:"你第一次见到德拉科·马尔福，是在斜角巷的丽痕书店里。\n\n那天你和你妈妈一起去买新学期要用的课本。书店里人很多，挤满了各个学院的学生和家长。你被人群推着往前走，在一排排书架之间穿梭，寻找那本《中级变形术指南》。\n\n然后你在魔药学那排的尽头看到了他。\n\n他靠在书架边，穿着一件剪裁精致的深绿色长袍，银灰色的眼睛正盯着一本书的封面，表情像是整家书店都欠了他一大笔钱。他的金色头发梳得一丝不苟，下巴微微扬起，带着一种天生的、几乎让人忍不住想要挑战的傲慢。\n\n你走过去，想从他身后的书架上拿那本《魔法药剂与药水》。但你的手伸过去的同时，他手里的那本书滑落了下来。\n\n你们两个同时弯下腰去捡。\n\n你的手碰到了他的手。他的手指很凉。\n\n他抬起头看了你一眼，然后把书接了过去。「你的手在颤。」他说，语气平淡得像是在陈述一个天气现象。\n\n「没有。」你直起身，拍了拍手上的灰尘。\n\n「有。」他也站了起来，把书塞回书架上，「说谎的人都会这样。」\n\n然后他走了。银灰色的背影消失在书架的拐角处。\n\n你站在原地，看着自己的手。它确实在微微发抖。不是因为紧张，不是因为害怕——是因为刚才碰到他的手指时，那种冰凉的触感让你莫名其妙地想起了冬天窗玻璃上的霜花。\n\n你在心里对自己说：这个人真奇怪。\n\n但你没有想到的是，你会记住这种奇怪的感觉很久很久。\n\n——\n\n三年级的时候，你们被分在了同一组，负责照顾一头纹角兽。那是一种性情温顺但偶尔会突然暴躁的神奇生物，需要非常耐心和细致的照料。\n\n德拉科显然不太擅长这个。他站在围栏外面，看着那只纹角兽，表情像是在看一个令人厌恶的怪物。\n\n「它不咬人，」你说，「只要你不用那种看垃圾的眼神看它。」\n\n「我没有看垃圾。」他冷冷地说。\n\n「你有。你的眉毛抬起来了三毫米，这是你看垃圾时的标准表情。」\n\n他愣了一下，然后——你确定你没有看错——他的嘴角动了一下。不是笑，但也不是他平时那种永远挂在脸上的傲慢。更像是一种被戳穿了的、带着一丝恼怒的有趣。\n\n然后事情发生了。\n\n他说了些什么——你不确定是什么，可能是关于纹角兽的角不够对称之类的话——那只纹角兽突然发怒了，扬起蹄子朝他冲了过来。\n\n你还没来得及思考，就已经冲过去拉了他一把。你们两个一起摔进了围栏旁边的草丛里。纹角兽从你们头顶跑过，被海格叫了回去。\n\n你躺在草丛里，看着天空，喘着气。德拉科比你先爬了起来。他的长袍沾满了泥土和草屑，金色的头发也乱成了一团。\n\n「你自己小心点，」他没有看你，声音里带着一种你后来才辨认出来的、被他刻意隐藏的关心，「别连累别人。」\n\n然后他走开了。\n\n你坐在草丛里看着他的背影，忽然想笑。因为他救了你——在摔下去的那一瞬间，他的手护住了你的后脑勺——然后他假装没有救过你。\n\n——\n\n五年级，一切都变了。\n\n你开始注意到德拉科的变化。不是那种显而易见的变化——他的傲慢还在，他的刻薄还在，他走路的方式还是那样，像是整个地板都应该为他让路。但在这些不变的东西下面，有什么东西在碎裂。\n\n你看到他在走廊里经过你身边的时候，脚步会放慢半拍——几乎察觉不到，但你察觉到了。你看到他在图书馆里翻书时，手指会比以前抖得更厉害。你看到他的眼睛下面出现了你从未见过的黑眼圈。\n\n然后有一天晚上，你在禁书区遇到了他。\n\n那天晚上禁书区只有你们两个人。他站在一排书架前面，手里拿着一本关于黑魔法的书，但他的眼睛没有在看书——他在看窗外，看外面黑漆漆的夜。\n\n你走过去，站在他旁边。\n\n「你最近看起来很累。」你说。\n\n「我没有。」他条件反射般地回答，然后合上了手里的书。\n\n沉默持续了很久。\n\n「如果有一天，」他终于开口了，声音比平时低了很多，「我做了一件让所有人都恨我的事——」\n\n他停了下来。他的手指在书的封面上来回摩挲着，像是要从那个光滑的表面上找到什么答案。\n\n「算了，没什么。」他说。\n\n但你记住了。你记住了他说那句话时的表情——不是害怕，不是后悔，是一种你在他身上从来没有见过的东西：孤独。\n\n——\n\n天文塔之夜，你从走廊的另一端看到了他。\n\n邓布利多站在塔顶上，老而疲惫，但依然挺直了背。德拉科站在他的对面，手里举着魔杖，手臂在发抖。\n\n你躲在楼梯口的阴影里，看着这一切发生。你的手指紧紧攥着自己的魔杖，指甲陷进了手掌里。\n\n他在发抖。你看到了。那个永远骄傲的、永远不可一世的德拉科·马尔福，举着魔杖的手在剧烈地发抖。他的嘴唇在动，像是在对自己重复着什么咒语，但他的声音太轻了，你听不清。\n\n然后斯内普来了。然后一切都结束了。\n\n德拉科放下了魔杖。他站在那里，看着邓布利多从塔顶上坠落下去。他的表情是空白的——不是冷漠，不是无情，是一种被抽干了所有感情的空白。\n\n那一刻你懂了。\n\n他不是没有做他该做的事。他做了。他举起了魔杖，他站在了邓布利多面前，他履行了伏地魔交给他的任务——但他抖着手，抬起魔杖，然后什么都没有做。\n\n在那个决定命运的瞬间，他选择了不作为。而在那一刻，对于一个从小被教导「你必须证明你的价值」的马尔福来说，这种不作为就是他所能做出的最大的抵抗。\n\n——\n\n战后审判庭上，所有人都在等待对马尔福家族的判决。卢修斯·马尔福坐在被告席上，表情麻木。纳西莎·马尔福坐在旁听席上，脸色苍白得像纸一样。\n\n德拉科站在证人席上，低着头，没有看任何人。\n\n然后你站了起来。\n\n你走到了证人台前，说出了一切——天文塔之夜你看到的一切。你描述了德拉科发抖的手，他空白的神情，他在最关键的那一刻什么都没有做。\n\n「他没有杀任何人，」你说，声音在安静的大厅里回荡，「在那个他可以选择杀死邓布利多的夜晚，他选择了不杀。这不是软弱，这是勇敢。在一个不允许勇敢的环境里选择不作为，本身就是最勇敢的作为。」\n\n你说完之后，大厅里沉默了很久。\n\n然后你转过身，走了出去。\n\n——\n\n审判结束后，他在走廊里叫住了你。\n\n「为什么？」他问。没有寒暄，没有感谢，没有任何多余的词——只有这两个字。\n\n你停下脚步，转过身看着他。\n\n「因为从斜角巷开始，」你说，「你就一直在假装不在乎我。」\n\n他的眼睛微微睁大了一下。然后他移开了视线，像是被你看到了什么他不想让人看到的东西。\n\n「我没有假装。」他说。\n\n你看着他——看着他那双灰色的眼睛，看着他那头依然梳得一丝不苟但比以前短了一些的金发，看着他身上那件已经不再有那种傲慢气质的、普通的黑色长袍。\n\n「我知道你在说谎。」你说。\n\n他沉默了很久。走廊里只有远处的脚步声和偶尔传来的低声交谈。然后——\n\n他笑了。\n\n不是冷笑，不是傲慢的笑，不是那种用来掩饰什么的假笑。是真正的、卸下了所有防备的、带着一点点苦涩和一点点释然的笑。\n\n「好吧。」他说。\n\n就两个字。但那两个字是他这一生说过最诚实的话。\n\n因为你终于看到了他——不是马尔福家的少爷，不是食死徒的儿子，不是那个永远在假装什么都不在乎的德拉科·马尔福——你看到了他。\n\n而他知道，你看到了。"},lupin:{n:"莱姆斯·卢平",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 3, "depth": 3, "bravery": 2, "rebel": 0, "humor": 1, "adventure": 1, "morals": 3, "wisdom": 3},t:["温柔内敛", "自我怀疑", "极度可靠", "隐忍的爱"],r:"你们之间的连接是安静而深刻的——他总觉得自己不配被爱，而你让他知道\"你值得\"。",tt:"《月圆的时候想你》",tb:"莱姆斯·卢平第一次走进霍格沃茨的黑魔法防御术教室时，带来的是一只装着博格特的旧箱子。\n\n他穿着那件打了补丁的棕色长袍，头发里已经夹杂了几缕银灰色的发丝。他的笑容是温和的——但如果你仔细观察，你会发现那种温和下面藏着一层薄薄的膜，像是玻璃窗上蒙着的一层雾气。他在笑，但他也在防备。\n\n你在第一排靠窗的位置坐着，看着他。所有人都在猜测这个新来的教授是什么样的人——他的穿着太寒酸了，他的笑容太礼貌了，他的声音太平静了，像是把所有的感情都压在了某个很深的地方。\n\n但你在猜另一件事。\n\n你猜他藏着什么。\n\n不是因为他的外表——虽然那件补丁长袍确实让人在意——而是因为他的身体记住了某些东西。他站立的姿势微微向左倾斜，像是右边的肋骨曾经受过伤。他笑的时候，嘴角的弧度有一个微妙的停顿，像是那个笑容需要经过一道他自己在心里设置的闸门才能释放出来。\n\n一个人长期扛着某种沉重的东西，身体是会记住的。\n\n你看到了。\n\n——\n\n课后你留下来帮他把椅子放回原位。教室里的学生们已经走光了，只剩下你们两个人。窗外的阳光斜斜地照进来，在石板上画出了长长的光带。\n\n「你不用留下来，」他说，一边把一张歪了的桌子摆正，「这些东西我自己能行。」\n\n「我知道，」你说，把最后一把椅子推到桌子下面，「但柜子搬不动。」\n\n你指的是那只装着博格特的旧箱子。它确实很重——重得像是里面装的不是一只博格特，而是他所有不想让人看到的秘密。\n\n他看了你一眼。然后他笑了——那层膜薄了一点。\n\n「谢谢。」他说。\n\n——\n\n他教你召唤守护神的那个下午，你去了三次都没有成功。\n\n「你需要一个幸福的记忆，」他说，「越清晰越好。闭上眼睛，找到它，然后念咒语。」\n\n你闭上眼睛，试着回想那些你觉得快乐的时刻——生日、假期、某一次考试拿到了优秀——但每一次，咒语都只是在魔杖的顶端冒出了一缕银白色的烟雾，然后就消失了。\n\n「不是因为这些记忆不够好，」你对他说，声音里带着一丝挫败感，「是因为……每一个幸福的记忆里，都带着一点恐惧。怕失去，怕不够好，怕配不上。那些恐惧像杂质一样混在里面，让记忆不再纯净。」\n\n他沉默了很久。\n\n然后他说：「我懂。我一直懂。」\n\n他的声音很轻，轻得像是在对一个老朋友说话。然后他走过来，站在你旁边，开始教你。不是那种教授对学生式的教学，而是一种平等的、两个理解彼此的人之间的分享。\n\n「你不需要完美的幸福记忆，」他说，「你只需要一个真实的。真实的东西不需要纯净——它只需要是真的。」\n\n那一次他教了你三个小时。窗外的太阳从最高处慢慢落到了地平线的边缘，教室里被夕阳染成了金色。最后，你的守护神出来了——一缕银白色的光芒从你的魔杖顶端涌出，在半空中凝聚成了一个清晰的形状。\n\n「配得上的，」他说，声音很轻。你不确定他是在说你的守护神，还是在说你。\n\n——\n\n满月前一天，他告诉了你。\n\n不是因为你在追问，不是因为你在怀疑——是因为他说他不想再对着在乎他的人说谎。\n\n「满月那天我在尖叫棚屋，」他说，声音平静得像是在讲述一个别人的故事，「每个月都是。从我还是个孩子的时候开始。我是个狼人。」\n\n你看着他。他的表情是平静的——但你知道那种平静下面藏着多少年来被误解、被恐惧、被排斥的痛苦。\n\n「我可以在门外吗？」你问。\n\n「不能进来。」\n\n「我知道。在门外就行。」\n\n他没有再说什么。但他的眼睛里闪过了一丝你从未在他身上见过的东西——不是感激，不是释然，是一种更加脆弱的、他很少允许自己拥有的东西：希望。\n\n满月之夜，你坐在尖叫棚屋外面的台阶上。月亮从云层后面露出来，银白色的光照在禁林的树冠上，像是给每一片叶子都镀了一层霜。你能听到棚屋里传来低沉的、不属于人类的声响。但你没有害怕。\n\n你坐在那里，看着天上的月亮，一直到天亮。\n\n天亮之后，棚屋的门开了。莱姆斯走了出来。他比前一天晚上苍老了许多，衣服破了，脸上有新添的伤痕。但他看到你的时候——看到你坐在那里，手里攥着一杯从厨房带来的姜茶——他的眼睛里闪过了一丝柔软。\n\n「你还在。」他说。\n\n「我说了，在门外就行。」你把姜茶递给他。\n\n他接过去，握在手里，闭上眼睛喝了一口。然后他睁开眼睛看着你，说了一句话：「你不该来的。」\n\n「我知道，」你说，「但你一个人我不放心。」\n\n他又喝了一口姜茶。然后他把杯子递还给你，手指在交接的时候轻轻碰了一下你的手指。那种触碰很短暂，但足够让你感受到——他的手是温的。不再像第一次在斜角巷碰到的那样冰凉了。\n\n——\n\n战争结束后你们在霍格沃茨的入口重逢。\n\n他比以前更苍老了一些，头发里又多了一些银灰色的发丝。但他的眼睛里那层膜已经薄了很多——薄到你能看到后面的东西了。那些东西叫做平静、叫做释然、叫做一个终于不需要再躲藏的人的自由。\n\n「那些信的最后一行，」他说，声音里带着一种你从未在他身上听过的轻快，「我想写的是——」\n\n「我知道，」你说，「我也是。」\n\n月亮从窗子外面照进来，他的侧脸是银白色的。\n\n你想起那些信——每一封的结尾都留着一小块空白，像是有什么话想说但没有说。你的回信也一样。那些空白不是遗忘，是一种默契——一种只有你们两个人才懂的、关于那些不必说出口的话的默契。\n\n你想，有些话不说出口，也早就都知道了。"},neville:{n:"纳威·隆巴顿",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 3, "depth": 1, "bravery": 3, "rebel": 0, "humor": 0, "adventure": 1, "morals": 3, "wisdom": 1},t:["成长型勇气", "善良纯粹", "被低估", "大器晚成"],r:"你看到了别人没有看到的——他不是笨拙的男孩，而是正在成长为英雄的人。",tt:"《等我变得勇敢》",tb:"你第一次注意到纳威·隆巴顿，是在一年级的飞行课上。\n\n那天他紧张得连扫帚都抓不稳。当他终于颤颤巍巍地飞离地面的时候，所有人的目光都集中在他身上——然后他像一片被风吹落的叶子一样，歪歪斜斜地栽了下去，摔在了草地上。\n\n大部分人都笑了。有几个人甚至笑出了声。\n\n你站在旁边没有笑。你看着他艰难地从草地上爬起来，脸红到了脖子根，拼命地盯着地面，像是要把自己埋进泥土里。\n\n你走过去，把他掉在地上的记忆球捡起来，拍了拍上面的泥土，递给他。\n\n「谢谢，」他说，声音小得像蚊子。他没有抬头看你。\n\n「我第一次飞的时候也掉下来了，」你说。\n\n这是谎言。你第一次飞的时候非常稳，甚至得到了霍琦夫人的表扬。但你知道此刻的纳威不需要真相——他需要的是有人告诉他，他并不孤单。\n\n他终于抬起了头，看了你一眼。他的眼睛红红的，但在那片红色下面，有什么东西亮了一下。\n\n那是你第一次在纳威·隆巴顿的眼睛里看到光。\n\n——\n\n从那之后，他开始来找你。\n\n不是那种大张旗鼓的、让人无法忽视的方式——而是安静的、小心翼翼的、像是在试探着什么。他会在图书馆里坐在你旁边的位置上，偶尔问一道草药学的题。你会耐心地给他讲解，而他听的时候，眼睛会亮。\n\n你发现了一个秘密：纳威说起植物的时候，整个人都不一样了。\n\n他的声音不再那么小，他的背不再那么驼，他的眼睛不再是那种总是带着歉意的躲闪。当他谈论曼德拉草的移植技巧、关于魔鬼网的生长周期、或者某一种罕见药草的用途时——他会发光。\n\n「你应该去参加草药学竞赛，」有一天你对他说。\n\n「我不行的，」他条件反射般地回答，声音又回到了那种小小的、不确定的状态，「我总是在关键时刻出错。你记得一年级的事吗？我连一个记忆球都拿不稳。」\n\n「那是因为你还没有足够想保护的东西，」你说。\n\n他愣了一下。然后他没有说话——但他把这句话记了很久。\n\n——\n\n你开始注意到纳威身上越来越多的东西。\n\n你注意到他每次在变形课上失败之后，都会一个人留在教室里练习到很晚。你注意到他会偷偷去温室帮斯普劳特教授照顾那些最危险、最没人愿意碰的植物。你注意到他在被马尔福嘲笑之后，会咬紧嘴唇，不让自己哭出来——不是因为软弱，是因为他不想让别人看到他的眼泪。\n\n他不是不勇敢。他只是还在学习如何勇敢。\n\n——\n\n然后战争来了。\n\n魔法部的那场战斗，是纳威第一次真正意义上的战斗。你看着他在食死徒的包围中站了出来——那个在飞行课上摔得满地找牙的男孩，那个连记忆球都拿不稳的男孩——他举起魔杖，毫不犹豫地冲了上去。\n\n他被打倒了。他爬了起来。他又被打倒了。他又爬了起来。\n\n你站在远处看着他，心里有一个声音在说：你看，他找到那个他想保护的东西了。\n\n——\n\n最后一战爆发在霍格沃茨。纳威站在城堡的大门口，面对着伏地魔和所有的食死徒。他的脸上有血，袍子烧破了，但他的眼睛是亮的——不是那种被恐惧逼出来的、带着泪光的亮，是一种真正的、从内心深处燃烧起来的亮。\n\n你站在人群里看着他。你想起了飞行课上那个摔倒在地的小男孩，想起了图书馆里那个小声问你问题的小男孩，想起了温室里对着植物发光的小男孩。\n\n然后纳威做了一件让整个战场都安静下来的事——他抽出了格兰芬多的宝剑，一剑斩断了纳吉尼的头。\n\n那一刻，整个霍格沃茨都在为他欢呼。\n\n——\n\n战后，你在废墟里找到了他。\n\n他坐在格兰芬多塔楼的台阶上，手里攥着那把剑，脸上的血已经干了。他的表情不是胜利的狂喜，也不是劫后余生的庆幸——是一种你从未在他身上见过的、真正的平静。\n\n「你变了很多。」你在他旁边坐下。\n\n「我觉得我只是……终于像我自己了。」他说。\n\n你们沉默地坐了一会儿，看着远处的黑湖。阳光照在水面上，碎成了千万片金色的鳞片。\n\n「你给我捡记忆球那天，」他说，声音很轻，像是怕打扰了什么，「你说你也掉下来了。我知道那是谎言。」\n\n你看着他。\n\n「但我知道你为什么说，」他继续说，「因为你想让我觉得我不是唯一一个摔下来的人。因为你不想让我觉得——我是孤独的。」\n\n他停了一下。然后他深吸了一口气，像是鼓起了很大的勇气。\n\n「所以我想，如果有一天我也能变得足够勇敢……」\n\n他没有说完。但他不需要说完。\n\n因为你听懂了。\n\n——\n\n战争结束之后，纳威成了霍格沃茨的草药学教授。\n\n你有时会去看他。你们会坐在温室里，看着他照料那些他热爱的植物。他会跟你讲每一种植物的名字、习性、用途——他的眼睛会发光，就像以前一样。\n\n有一天，你问他：「你当初说的'如果我变得足够勇敢'，后面那句是什么？」\n\n他放下了手里正在修剪的曼德拉草，转过身来看着你。阳光从温室的玻璃屋顶照进来，在他的脸上投下了斑驳的光影。\n\n「告诉你我喜欢你，」他说，平静的，像在心里说了很多很多遍，「从你捡起那颗记忆球的时候。」\n\n温室里的光是绿的，暖的，柔和的。空气里弥漫着泥土和药草的味道。\n\n你想，原来等了这么久，等的是一个变成自己的人。\n\n值得。"},fred:{n:"弗雷德·韦斯莱",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 2, "depth": 1, "bravery": 2, "rebel": 3, "humor": 3, "adventure": 3, "morals": 1, "wisdom": 1},t:["幽默天才", "恶作剧之王", "用笑掩盖深情", "不羁"],r:"你是他唯一一个不想开玩笑的人。他的笑话给所有人，真心话只给你一个人。",tt:"《笑着笑着就爱上了》",tb:"你第一次和弗雷德·韦斯莱产生交集，是因为你变成了一只绿色的树蛙。\n\n那天你在走廊里走着，经过韦斯莱兄弟面前那堆看起来像普通糖果的小玩意儿。你本来没想碰任何东西——你知道韦斯莱兄弟的产品需要保持一定距离——但不知怎么的，你的衣角扫过了一个放在最外面的、包装纸上画着笑脸的小盒子。\n\n然后你的世界变成了一片绿色。\n\n准确地说，你变成了一只树蛙。一只通体翠绿色、有着大眼睛和粘乎乎的手脚的树蛙。你低头看着自己（如果那还能叫「自己」的话），发出了一个类似「呱」的声音。\n\n然后你听到头顶传来一阵努力压抑的憋笑声。\n\n你抬起头——如果青蛙能「抬头」的话——看到了一张脸。红发，雀斑，正在用尽全身力量不让嘴角咧开的脸。他蹲了下来，双手撑在膝盖上，认真地看着你。\n\n「好消息是，」他说，声音里压着笑，「颜色很好看。这个绿色很衬你的……呃……蛙形。坏消息是……」他又憋了一下笑，「坏消息是我们还没测试解药。」\n\n你「呱」了一声。那个声音在空旷的走廊里回荡，听起来既绝望又好笑。\n\n「别担心，」他蹲在那里，开始一本正经地讲解这个实验的研发历程——原材料、配方、预期的效果时间、以及他们本来打算在下周一才开始测试的计划，「理论上来说，二十分钟内应该会恢复正常。但理论嘛……」他耸了耸肩，那个动作在他身上显得格外滑稽。\n\n二十分钟。\n\n你就那么坐在走廊的地板上，一只绿色的树蛙，听着一个红头发的男孩认真地向你解释一个他还没有完全搞清楚的产品。他讲得很详细——太详细了——详细到让你觉得他不是怕你害怕，而是怕你觉得无聊。\n\n二十分钟之后，你变回来了。\n\n你坐在地板上，看着自己的手——人的手，不是青蛙的手——长长地舒了一口气。然后你抬头看他。\n\n他蹲在你旁边，脸上带着一种混合着歉意和兴奋的表情。\n\n「对不起，」他说，然后——你确定——他又想笑了，「真的对不起。但这个效果比我们预期的还要好。你看，我们本来想让人变成黄色——但绿色！绿色比黄色好看多了！」\n\n你看着他。你本来应该生气的——你变成了一只青蛙，在走廊里坐了二十分钟，而且还听到了一堂关于产品测试不充分的讲座。但你看着他的脸，看着他那双闪闪发光的眼睛，看着他那种「我做了一件坏事但我真的很兴奋」的表情——\n\n你笑了。\n\n他愣了一下，然后他也笑了。这一次没有压着。\n\n——\n\n从那以后，你的书桌上开始出现各种各样的新产品。\n\n不是正经的礼物——是恶作剧商店还在研发阶段的、没有上市的、甚至连名字都还没有想好的实验品。每一样东西都附着一张纸条，上面写着使用说明和注意事项。有时候注意事项只有一行字：「可能变绿，可能变红，可能唱歌，不确定。」\n\n你用了一颗让人笑不停的糖，在魔药课上被罚了两周。你把罚单夹在那张说明书纸条里，还给了他。纸条上你加了一行字：「附赠代价说明书。」\n\n他来找你道歉。他站在你的教室门口，没有进来，双手插在口袋里——这是你第一次看到弗雷德·韦斯莱道歉，也是你第一次看到他看起来不像是在开玩笑。\n\n「我欠你两周的点心，」他说，「利息算进去。」\n\n「三周。」你说。\n\n「成交。」\n\n他真的补了三周。每一周的点心都不一样，而且每一周都附着一张新的纸条——「这周的巧克力蛙不会逃跑，我保证」「今天的蜂蜜公爵特供——不含任何恶作剧成分」「最后这周的礼物：一张你随时可以来笑话商店免费拿任何东西的券」。\n\n你从来没有用过那张券。但你一直把它放在钱包里。\n\n——\n\n然后到了乔治受伤的那一天。\n\n你在医疗室外面的走廊里找到了弗雷德。他坐在地上，背靠着墙，双手撑在膝盖上。他没有哭——他的表情是空白的，像是所有的感情都被一个巨大的冲击波从他的身体里抽走了。\n\n你走过去，在他旁边坐了下来。你什么都没说。你只是坐在那里。\n\n过了很久，他说了一句话。声音很低，像是从很远的地方传来的。\n\n「你在这里，」他说，「我好很多。」\n\n那是你第一次看到他真正认真的样子。不是那个永远在笑的弗雷德，不是那个永远在开玩笑的弗雷德——是一个害怕失去自己另一半的弟弟。\n\n你把手放在他的手背上。他的手在发抖。\n\n「他会好起来的，」你说。\n\n「我知道，」他说，然后声音更低了，「但我怕的不是他不好起来。我怕的是他好起来之后，不再是从前那个他了。」\n\n你看着他，想说什么，但什么都说不出来。因为你知道他说的是对的。有些伤口不只是身体上的。\n\n——\n\n学校要沦陷的最后一夜，他在走廊里找到了你。\n\n他把一盒糖塞到了你的手里。那盒糖的包装和以前都不一样——是一种你从未见过的深红色包装，上面用金色的字体写着一个名字：「限定款。」\n\n「没上市的，」他说，「就你一个人有。」\n\n你看着他。他的表情和平时不太一样——那种永远挂在脸上的、游刃有余的笑容还在，但它的底色变了。从轻松的金色变成了某种更深、更重的颜色。\n\n「你在交代后事？」你说。\n\n他笑了。但这一次，他的眼睛里多了一点你叫不出名字的东西。后来你知道了——那个东西叫做不舍。\n\n「不是，」他说，「是提前给的生日礼物。等我回来，我请你吃霍格莫德最贵的那家。」\n\n你点头。你没有说「如果你回不来怎么办」。因为你不想让他的最后一句话变成安慰你的话。\n\n「好，」你说，「我等你。」\n\n——\n\n他没有回来。\n\n战斗结束后的早晨，你在废墟里找到了他。他躺在一堆碎石旁边，表情是平静的——不是空白的，是平静的。像是他最后看到的东西不是什么可怕的东西，而是某个让他觉得安心的画面。\n\n他的手里攥着一样东西。你掰开他的手指，看到了一张纸条。那张纸条已经被血浸透了大半，但你还认得出来——那是你给他的那张「附赠代价说明书」的罚单。他在上面加了一行字：\n\n「三周的点心还完了。但欠你那家餐厅，等我回来还。」\n\n——\n\n多年以后，你和乔治一起把韦斯莱魔法把戏坊开到了整个巫师世界。\n\n店里有一个专门的柜台，放着他所有没来得及推出的产品。每一个产品旁边都有一张标签，写着它的名字、功能、以及——在最后一行——「弗雷德·韦斯莱的实验品。好玩的事没做完，不算结束。」\n\n你坐在那个柜台后面的椅子上，手边放着那盒限定款糖。它已经过期很久了，但你始终没有打开它。\n\n你在等一个合适的时候。\n\n打开的那天，你会对着空气说：味道很好。你说要请我吃的那家餐厅我去了，乔治付的钱，但那个位置是你的，我帮你坐了。\n\n然后你会吃一颗那颗让人笑不停的糖，在店里笑得最大声的那个人旁边——让所有人都知道，弗雷德·韦斯莱的恶作剧，还在继续。"},james:{n:"詹姆·波特",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 2, "depth": 1, "bravery": 3, "rebel": 2, "humor": 2, "adventure": 3, "morals": 2, "wisdom": 1},t:["自信阳光", "为爱改变", "骑士精神", "天生的领袖"],r:"他会为了你变成更好的自己——不是你要他改，是他觉得你值得更好的他。",tt:"《追光的人》",tb:"詹姆·波特第一次追你的时候，所有人都知道。\n\n他在走廊里拦你。不是那种「让一下」的拦——是那种「我要和你说句话所以你必须停下来」的拦。他会突然出现在你面前，带着那种自信的、毫无歉意的笑容，头发比任何时候都乱，眼镜片上反射着走廊里的魔法灯光。\n\n「嘿，」他说，「你今天看起来不错。不对，你每天都看起来不错。那我换个说法——我今天看起来怎么样？」\n\n你翻了个白眼，从他身边走过。\n\n他在课堂上看你。不是那种偷看——詹姆·波特从来不会偷看——是那种光明正大的、毫不掩饰的、让所有老师和同学都心知肚明的看。他的目光会从黑板上移到你身上，停留两秒，然后再移回去。然后再移回来。再移回去。\n\n「波特先生，」弗立维教授有一次终于忍不住了，「如果你能把看某人的精力分一半给看黑板的话，你的变形术成绩也许会更好。」\n\n全班笑了。你没有笑。但你感觉到了耳朵在发热。\n\n他在魁地奇赢了之后在人群里找你的眼睛。每次比赛结束，当整个格兰芬多都在为他欢呼的时候——他会穿过人群，穿过那些伸向他的手和那些喊着他名字的声音，找到你所在的位置，然后对你眨一下眼睛。\n\n就一下。然后他就被人群淹没了。\n\n「你到底为什么这么烦人？」有一次你终于忍不住了，在走廊里停下来问他。\n\n他咧嘴一笑——那个笑里带着三分得意、三分认真、还有四分你看不懂的东西。\n\n「因为你不烦的时候，」他说，「看不到你。」\n\n你翻了个白眼。但你的耳朵红了。\n\n——\n\n他追了你四年。\n\n不是那种浪漫的四年——是笨拙的、莽撞的、无数次被你骂的四年。他会送你花，但你告诉他你不喜欢花因为花会枯萎。他会给你写纸条，但你告诉他你的字迹太潦草了你看不懂。他会在你生日的时候送你一盒巧克力，但你告诉他你正在戒糖。\n\n每一次被拒绝之后，他都会消沉大概两个小时。然后他又会出现在你面前，带着一个新的主意、一种新的方式、一句新的蠢话。\n\n你开始觉得这个人永远不会放弃。\n\n——\n\n然后五年级，他开始变了。\n\n不是那种一夜之间的变化。是一种缓慢的、几乎让人察觉不到的变化。他不再那么爱炫耀了——在魔咒课上，当弗立维教授问谁能做出最完美的漂浮咒时，他没有第一个举手，而是等了几秒钟，看看有没有其他人想说。他开始在别人被欺负的时候站出来——不是因为想要掌声，不是因为想要展示格兰芬多的勇气，而是因为那是对的。\n\n你看到了这些变化。\n\n但你什么都没说——不是因为不感动，是因为你怕说了他会得意忘形。你知道詹姆·波特的弱点是什么：他太容易因为一点点肯定而膨胀。如果现在告诉他你看到了他的改变，他可能会回到从前那个不可一世的样子。\n\n所以你什么都没说。但你把那些变化记在了心里。\n\n——\n\n毕业那天，他找到了你。\n\n没有开玩笑。没有做鬼脸。没有那些他用了四年的、让你又烦又忍不住笑的小把戏。他只是站在那里，穿着他的毕业长袍，头发依然乱，但眼神不一样了。\n\n「我变了，」他说，声音里带着一种你从未在他身上听到过的认真，「不是因为我想让你喜欢我。是因为我喜欢你之后，我想成为配得上你的人。」\n\n你看他。想了一秒。然后你笑了——那是你第一次在他面前真心地笑。不是敷衍的，不是无奈的，是真正被触动了的那种笑。\n\n「你本来就不差，」你说。\n\n「我知道，」他说，「但我想更好。」\n\n然后他牵起了你的手。\n\n「我喜欢你，很久了。比我自己知道的还要久。」\n\n「我知道，」你说，「因为你说了很多次了。」\n\n「那这次算不算？」\n\n「算。」\n\n——\n\n后来你们一起加入了凤凰社。\n\n不是那种「他加入所以你加入」的关系——你加入是因为你相信这件事是对的。但你们确实在一起了，在那些危险的、秘密的、随时可能失去彼此的任务中。\n\n最后一次任务之前，他在门口抱了抱你。\n\n「回来之后我请你喝黄油啤酒。」他说。\n\n「你已经欠了我很多次了。」你说。\n\n「那就一起还。」\n\n他走了。门在他身后关上。\n\n——\n\n他没有回来。\n\n你是在三天后听到的消息。伏地魔找到了他们。詹姆给了莉莉时间带着哈利逃走——他一个人面对了伏地魔。他甚至没有拿魔杖。\n\n你坐在他和莉莉曾经一起坐过的那个沙发上，手里攥着一封信。那是他最后一封写给哈利的信——不是给哈利的，是给你的。信只有三行：\n\n「我这一生做的最好的事，就是追到了你。如果我回不来，别哭——帮我照顾好哈利。然后继续做那个让我追了四年的、翻白眼翻得最好看的人。」\n\n你把那封信折好，放在枕头底下。\n\n然后你站起来，走出去，替他继续做那些他没来得及做的事。\n\n因为你就是那种人——那个追光的人倒下了，你就成为光。"},cedric:{n:"塞德里克·迪戈里",h:"赫奇帕奇",hc:"house-h",g:"male",s:{"loyalty": 3, "depth": 2, "bravery": 2, "rebel": 0, "humor": 1, "adventure": 2, "morals": 3, "wisdom": 2},t:["温暖可靠", "公平竞争", "被所有人爱", "温柔的力量"],r:"他是那种你不需要解释自己就能被理解的人。坐在一起不说话，就已经很好了。",tt:"《你应该被好好地爱过》",tb:"你第一次见到塞德里克·迪戈里，是在魁地奇球场边。\n\n那天是赫奇帕奇对拉文克劳的比赛。你坐在看台的角落里，手里拿着一本书，但你的注意力并没有在书上——你在看球场。\n\n然后他从天空中飞了下来。\n\n不是那种优雅地降落的方式——他飞得太快了，险些撞到了站在场边的你。他在最后一刻猛地勒住扫帚，扫帚的尾端擦着你的头发飞了过去，扬起了一阵风。\n\n他立刻停了下来，从扫帚上转过身，脸朝向你。\n\n「对不起，」他说，声音里带着一种真实的、毫不掩饰的歉意，「我没注意到你在这里。你没事吧？」\n\n你摇了摇头，说没事。\n\n他看起来松了一口气。但那个表情不只是「我差点撞到人所以有点内疚」那种程度的松了一口气——更像是一种「我伤害了别人比任何事情都让我难受」的松了一口气。\n\n「以后我降落的时候会看下面，」他说，然后重新骑上扫帚飞了回去。\n\n你站在原地，看着他的背影消失在球场上空。\n\n你站在原地想了一件事：这个人道歉的方式很认真。认真到让人觉得——他的歉意是真的，不是那种礼貌性的、走过场的道歉。\n\n——\n\n你们真正认识是在图书馆。\n\n那天你在找一本关于魔法史的参考资料，在书架间走来走去。然后你在同一个书架的另一侧看到了他。他也在找书——手里拿着一张清单，认真地核对着一排排书脊上的标题。\n\n你绕过书架，走到了他旁边。\n\n「你在找什么？」你问。\n\n「《中世纪魔法法典》，」他说，「但我好像找错了书架。」\n\n「在三楼的法律文献区，」你说，「这里只有魔法史。」\n\n他愣了一下，然后笑了。那个笑容和他的道歉一样——认真的、真诚的、不掺任何杂质的。\n\n「谢谢你。我叫塞德里克·迪戈里。」\n\n「我知道，」你说，「赫奇帕奇的找球手。」\n\n他的笑容里多了一丝不好意思。「你也是来看比赛的？」\n\n「我每次都在，」你说，「只不过我看的不是比赛。」\n\n「你看的是什么？」\n\n「看人。」\n\n他看了你一眼。然后他没有再问什么——但他记住了。\n\n——\n\n三强争霸赛宣布的时候，整个霍格沃茨都沸腾了。\n\n塞德里克被选为赫奇帕奇的勇士。所有人都在讨论这件事——有人佩服他的勇气，有人觉得他只是运气好，有人私下里说「赫奇帕奇的人也能当勇士？」。\n\n你什么都不说。你只是在看他。\n\n你看到他在训练的时候，一个人对着假人练习防御咒语，一遍又一遍，直到汗湿透了衬衫。你看到他在图书馆里查阅关于第一个任务的资料，面前堆着三摞书，每一本都翻得密密麻麻。你看到他在走廊里被低年级的学生拦住要签名——他没有敷衍，而是认真地和每个人说了几句话。\n\n第一个任务之前，他找到了你。\n\n「我遇到了一个难题，」他说，「关于火龙的那部分，我查了很多资料，但有一个问题一直想不明白。你帮我看看——这两件事能不能同时成立？」\n\n你们在图书馆的角落里研究了一个下午。你帮他梳理思路，帮他找到了一些他漏掉的资料，帮他理清了那些混乱的信息。\n\n最后他说：「难我不怕。我只是不想用不干净的方式。」\n\n你看着他，想：这个人的底线真的在他说的地方。不是说说而已，不是表演给谁看的——是他真正在坚持的东西。\n\n——\n\n第三个任务前夜，你们在湖边坐到很晚。\n\n月亮照在黑湖的水面上，碎成了千万片银色的光。远处城堡的灯光一点一点地暗下去，像是整个霍格沃茨都在为明天的比赛屏住呼吸。\n\n「等我回来，」他说，声音很轻，轻得几乎被湖面上的风吹散了，「我要好好谢你。」\n\n你看着他。\n\n「不是谢你帮我做的那些事——那些是应该的。」他停了一下，然后继续说，「是谢你在我是'塞德里克·迪戈里'之前，先看到的是我这个人。」\n\n你想说「这很容易」。想说「你值得被这样看到」。想说「如果不是我，也会有别人」。但你什么都没说——因为对很多人来说，被真正看见，是从来没有过的事。而对塞德里克来说，他值得听到这句话。\n\n所以你什么都没说。你只是坐在他旁边，看着月亮从湖面上慢慢升起来。\n\n——\n\n他没有回来。\n\n哈利拿着三强杯从墓地回来，另一侧是一个人的尸体。\n\n你站在人群的最后面，看着塞德里克被抬进城堡。他的表情是平静的——不是痛苦的，不是恐惧的。后来你从哈利口中知道了墓地里发生的一切。你知道了他在最后一刻对哈利说的话：「把尸体带回给我父亲。」\n\n你坐在湖边，那个你们坐过很多次的地方。月亮还是那个月亮，湖还是那个湖，但那个对你说「等我回来」的人不在了。\n\n你在湖边坐了很久。你没有哭——不是因为不伤心，是因为有些悲伤太大了，大到眼泪装不下。\n\n——\n\n霍格沃茨重建的时候，你在湖边的那棵山毛榉树上刻了一行字。\n\n字不深，但足够清晰。树皮会随着时间慢慢愈合，但那行字会留在树的里面，跟着它一起长高、变粗、变老。\n\n「你应该被好好地爱过。」\n\n因为他是的——被他父亲，被他的队友，被那些他用真心对待的人。被你。\n\n那个任务之前他问：「你为什么这么确定我会回来？」你说：「因为我说了就是。」\n\n你说了。他没有回来。\n\n但那行字留在树上。留在湖边。留在每一个路过那里、停下来看一眼的人的心里。\n\n留了很久，很久。"},george:{n:"乔治·韦斯莱",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 3, "depth": 2, "bravery": 2, "rebel": 2, "humor": 3, "adventure": 2, "morals": 2, "wisdom": 2},t:["一半的幽默", "一半的深情", "失去后的重建", "安静的坚强"],r:"他经历过最深的失去，所以比任何人都珍惜你。他的笑里藏着悲伤，但他选择在你面前笑。",tt:"《一半的我》",tb:"乔治·韦斯莱在医疗室里坐了三天。\n\n弗雷德不在了。\n\n你知道这句话的分量。不是「弗雷德离开了」，不是「弗雷德走了」，是「弗雷德不在了」。那个从出生起就和他共用一个房间、共用一个笑话、共用一个灵魂的人——不在了。\n\n所有人都知道该说什么。「节哀」「他会在天上看着你」「时间会治愈一切」。所有人都知道该做什么——给他一个拥抱，拍拍他的肩膀，流几滴眼泪然后走开。\n\n只有你不知道。\n\n你走进医疗室，在他旁边坐下来。什么都没说。\n\n他看了你一眼。那个眼神是空的——不是冷漠，不是愤怒，是被一个巨大的黑洞吸走了所有光之后的空。他的红头发比以前暗了一些，像是火焰被风吹到只剩下最后一丝火星。\n\n「他会说你傻，」他说，声音嘶哑得像砂纸摩擦，「坐在这里陪一个哑巴。」\n\n「那我宁愿是傻的。」你说。\n\n那是战争结束后，你第一次听到他笑。\n\n不是开心的笑。是那种肌肉还记得但脑子忘了怎么笑的笑。像是他的嘴角还记得怎么向上弯，但他的心里还没有找到笑的理由。\n\n——\n\n笑话商店重新开张那天，他在门口站了很久。\n\n那扇门是弗雷德设计的——一个巨大的、会自己打开的门，门把手上刻着「韦斯莱是我们的王」。推开门，里面是他们一起规划了三年的空间：左边是恶作剧产品区，右边是魔法道具区，中间的天花板上挂着他们自己设计的、会自动变色的魔法灯笼。\n\n一切都在原地。所有东西都在原地。只有一个人不在了。\n\n他在门口站了很久。你站在他旁边，也等了很久。\n\n「一个人开一家双胞胎商店，」他终于开口了，声音很轻，「这个笑话也不算太烂。」\n\n「弗雷德会喜欢这个笑话的。」你说。\n\n「他会说'只有你能想出这么烂的笑话'，」乔治说，嘴角微微动了一下，「然后在你头上拍一下。」\n\n你想起弗雷德。那个总是站在乔治旁边、比乔治高半个头、笑起来比乔治大声的红发男孩。眼睛有点热。\n\n乔治看到了。他什么都没说，只是把手放在你的肩上，轻轻按了一下。\n\n那个按的动作很轻。但你知道——那是他在说：谢谢你在这里。\n\n——\n\n商店开张之后的日子里，乔治变了。\n\n不是那种显而易见的变化。他还是会开玩笑，还是会发明新的恶作剧产品，还是会在顾客进来的时候用那种热情的、韦斯莱家族特有的方式打招呼。但如果你仔细观察——如果你像他身边的人那样仔细观察——你会发现一些不一样的东西。\n\n他不再同时说两句话了。以前他和弗雷德在一起的时候，他们会同时开口，说完同一句话的两半，然后一起笑。现在他说话的时候会有一个微妙的停顿——像是在等另一个人接下半句，但那个人永远不会来了。\n\n他开始在一些不经意的时刻沉默。不是在人群中——在人群中的乔治永远是那个最活跃的人——而是在只有你们两个人的时候。他会看着某个方向，眼神穿过了眼前的东西，看向了某个只有他能看到的画面。\n\n你从来不问他在看什么。因为你大概知道——他在看弗雷德。\n\n——\n\n后来你们在一起了。\n\n不是某一天突然宣布的那种。不是「我喜欢你」「我也喜欢你」然后拥抱接吻的那种。是一种缓慢的、不知不觉的、某一天你发现已经是了的状态。\n\n你会在商店关门之后留下来帮他收拾。他会在你做噩梦的那个晚上给你寄一只守护神——一只银色的凤凰，飞到你的窗前，用弗雷德的声音说「没事了」。\n\n你们会在周末的早晨一起去对角巷买材料，回来的路上他会讲一个弗雷德以前讲过的笑话，然后你们一起笑，一起沉默。\n\n有一天晚上，商店打烊了。他在整理货架，你坐在柜台后面算账。窗外的月光照进来，把整个商店染成了银白色。\n\n「喂。」他说。\n\n「嗯？」\n\n「我喜欢你。」\n\n你放下账本，抬起头。\n\n他不看你。他继续整理货架上的商品——把一盒盒飞羽笔摆整齐，把一罐罐变色墨水排列成他喜欢的顺序。但他的耳朵是红的。\n\n「弗雷德早就说过，」他说，声音比平时低了很多，「他说你是我的人。只是我自己还没意识到。」\n\n你笑了。然后你哭了。\n\n不是因为悲伤。是因为有些东西——绕了那么远，经过了那么多的失去和痛苦——最后还是回来了。\n\n「他说对了，」你说，「就是晚了一点。」\n\n「但还来得及。」他终于转过身来看着你。\n\n他的眼睛里有光。不是那种被黑洞吸走所有光之后的空——是一种新的、不一样的光。不是弗雷德的光，是他自己的光。\n\n「还来得及。」他重复了一遍。\n\n然后他走过来，把你从柜台后面拉了出来，抱住了你。\n\n那是他第一次主动抱你。他的手臂很紧，像是怕你也会像弗雷德一样消失。\n\n「我不会走，」你说，「我就在这里。」\n\n「我知道，」他把脸埋在你的头发里，声音闷闷的，「我只是……需要确认一下。」\n\n你们就这样抱了很久。窗外的月亮从一头移到了另一头，商店里的灯笼自动变了好几次颜色。\n\n最后他说了一句话。声音很轻，但你听得清清楚楚。\n\n「弗雷德，」他说，「她在这里。我很好。」\n\n你闭上眼睛，抱紧了他。\n\n一半的他走了。但另一半的他还在这里。而你——你会陪着这另一半，一直走下去。"},regulus:{n:"雷古勒斯·布莱克",h:"斯莱特林",hc:"house-s",g:"male",s:{"loyalty": 2, "depth": 3, "bravery": 3, "rebel": 3, "humor": 0, "adventure": 1, "morals": 3, "wisdom": 2},t:["安静的勇气", "暗中反抗", "被家族束缚", "孤独的牺牲"],r:"他一生都在安静地做对的事——没有掌声没有人知道。你是唯一理解他沉默背后的人。",tt:"《悄悄做了对的事》",tb:"雷古勒斯·布莱克从来不是那种会出现在人群中心的人。\n\n在他的家族里，光芒属于他的哥哥——小天狼星。那个叛逆的、大声的、把所有规矩都踩在脚下的布莱克家的大儿子。所有人都看着小天狼星，所有人都在讨论小天狼星，所有人都在说「那个布莱克家的疯子」。\n\n而雷古勒斯站在阴影里。安静地、体面地、像一个完美纯血少爷应该做的那样。\n\n但你不是所有人。\n\n你第一次注意到他，是在霍格沃茨的走廊里。\n\n那天你抱着一摞书走在回公共休息室的路上。在经过一个书架的时候，你看到了他——他站在书架前面，手里拿着一本不属于他的书。那本书被放错了位置，放在了一排和他正在看的书完全不相关的类别里。\n\n他翻到封面，看了一下，然后不动声色地把它放回了正确的架子上。\n\n没有人看到。走廊里只有你们两个人，而你在远处的拐角处。他也没有指望有人看到——他的动作很自然，像是在做一件每天都在做的事，一件不需要观众的事。\n\n你站在原地想了一秒，然后走了过去。\n\n「你知道那本书放错位置了？」你问。\n\n他转过身看你。他的眼睛是灰色的——和小天狼星一样的灰色，但小天狼星的眼睛里有火，而他的眼睛里有一种更安静的东西。\n\n「每次路过都看见，」他说，「今天顺手放回去了。」\n\n「每次路过……」你想了想，「你走这条路多久了？」\n\n「三年，」他说，「那本书放错了三年。」\n\n你看着他。三年。一个没有人注意到的、放错位置的书。一个每天路过都会看到的人。一种沉默到近乎偏执的在意。\n\n你笑了。\n\n他不解地看着你。像是在问：这有什么好笑的？\n\n「只是在想，」你说，「一个人需要多安静，才能注意到一本书放错了三年。」\n\n他的表情变了。不是笑——他很少笑——而是一种「终于有人理解了」的表情。那种表情在他脸上停留了一秒钟，然后就消失了。\n\n但他没有否认。\n\n——\n\n后来你知道了关于他的很多事。\n\n你知道了他加入了食死徒——不是因为相信伏地魔的理念，是因为在那个家里，在那个以纯血为荣、以忠诚为命的家族里，他没有别的选择。他的母亲把食死徒的标志刻进了他的皮肤之前，甚至没有问过他愿不愿意。\n\n你知道了他开始怀疑——不是在一瞬间，而是在无数个安静的夜晚，在他一个人看着那些放错了位置的书的时候。他开始想：如果连一本书放错了位置都让他觉得不舒服，那整个世界放错了位置呢？\n\n你知道了他在暗中做了一些事——一些很小、没有人知道的事。他帮一个被食死徒盯上的麻瓜出身的学生改了档案。他在伏地魔的会议上故意说错了一个情报。他在某个夜晚偷偷把一份名单交给了一个他信任的人。\n\n没有人知道。他也没有指望有人知道。\n\n——\n\n他消失之前来找过你一次。\n\n那天晚上你们在禁书区的老地方——那张橡木桌子。他的面前没有书，只有一杯已经凉了的茶。\n\n「我要去做一件事，」他说，声音平静得像是在讨论明天的天气，「可能回不来。」\n\n你看着他。\n\n「什么事？」你问。\n\n「对的事，」他说，「就是晚了一点。」\n\n你知道他在说什么。你知道他指的是什么——那个魂器，那个伏地魔藏起来的不死的秘密。你知道他想去找到它、毁掉它。\n\n「你不需要告诉我，」你说。\n\n「我知道，」他说，「但我想告诉一个人。在去之前。」\n\n「为什么是我？」\n\n他看了你很久。然后他说了一句话——那句话是他这辈子说过的最长的一句话。\n\n「因为你注意到了一本书放错了三年。」\n\n——\n\n他走了。后来你从克利切——那个布莱克家的家养小精灵——那里知道了一切。\n\n湖底的魂器。他一个人的计划。他让克利切喝下那杯毒药，然后他自己喝下了剩下的。他让克利切带着真正的魂器逃走。他一个人留在了湖里，被那些阴尸拖了下去。\n\n没有人知道。没有掌声。没有名字。\n\n直到很多年后，在格里莫广场12号，哈利他们找到了雷古勒斯留下的那张字条。字条上写着：\n\n「R.A.B.——如果你读到这封信，意味着我做到了。不要让我的名字出现在任何地方。做对的事不需要名字。」\n\n你把那张字条从哈利的描述中想象了出来。你想象着雷古勒斯写下那张字条时的样子——他的手指因为毒药的作用在发抖，他的呼吸越来越微弱，但他的笔迹依然是工整的、体面的、像他一贯的风格那样一丝不苟。\n\n你把那张字条折好——在心里——放进口袋里。你没有跟任何人说。\n\n因为他不需要掌声。不需要英雄的名号。不需要被写进魔法史。\n\n他需要的只是——有一个人知道，他做了对的事。\n\n而你知道了。\n\n从始至终，只有你知道。就像那本放错了三年的书一样——只有你注意到了。"},theo:{n:"西奥多·诺特",h:"斯莱特林",hc:"house-s",g:"male",s:{"loyalty": 1, "depth": 3, "bravery": 1, "rebel": 2, "humor": 0, "adventure": 1, "morals": 2, "wisdom": 3},t:["沉默观察者", "独立思考", "不随波逐流", "安静的叛逆"],r:"你们都是不需要融入人群也能自在的人。你们之间有安静的默契——不需要说话，一个眼神就够了。",tt:"《三张桌子的距离》",tb:"西奥多·诺特坐在图书馆最远的角落。\n\n你第一次注意到他，是因为所有人都在讨论魔法部事件——哈利·波特说伏地魔回来了，乌姆里奇说那是谎言，整个霍格沃茨分成了两派——而他在看一本和那件事完全没有关系的书。\n\n那是一本关于古代北欧魔法符文的书，厚重的、封面已经泛黄的旧书。他的手指翻过每一页的速度很慢，像是在咀嚼每一个字的含义。\n\n你走过去，在同一个角落、隔了三张桌子的位置上，坐了下来。\n\n你没有和他说话。他也没有和你说话。你们就这样同处了一整个下午——他在看他的古北欧符文，你在写你的草药学论文。偶尔你能听到他翻页的声音，偶尔他能听到你羽毛笔在羊皮纸上划过的声音。\n\n没有人说话。也不需要说话。\n\n——\n\n第二次，你们又在那里。\n\n他抬起头看了你一眼。你也看了他一眼。没有微笑，没有点头，没有任何多余的动作——只是两个在同一张桌子上确认了彼此存在的人的、最简洁的交流。\n\n然后你们各自继续了自己的事。\n\n但你们都知道——另一个人也选择了角落，选择了安静，选择了不融入那些吵闹的、非黑即白的争论。这就够了。\n\n——\n\n第一次真正说话，是因为一本书。\n\n那天你在书架间找一本关于魔药理论的书——斯拉格霍恩教授布置了一篇很长的论文，你需要一些额外的参考资料。你走到魔药学那排的尽头，然后你的手和另一只手同时伸向了同一本书。\n\n你抬起头。是他。\n\n「还有另一本，」他说，声音很低，带着一种他特有的、不紧不慢的节奏，「但注解不同。」\n\n「哪一本的注解更好？」你问。\n\n「取决于你想知道什么。」\n\n你看着他。他的眼睛是深棕色的，像是秋天最深处的那种棕色——不是温暖的，不是冰冷的，是一种你很难用语言描述的颜色。\n\n他想了想。\n\n「我坐过来可以吗？」他问。\n\n那是你们之间第一个真正的问题。不是关于书的，不是关于论文的，不是关于任何可以被归类的学术话题的。\n\n是关于「我可以靠近你吗」。\n\n你点了点头。\n\n——\n\n从那以后，你们之间的距离从三张桌子变成了两张，从两张变成了一张，从一张变成了零。\n\n他话不多。在所有人里，他可能是话最少的那个。但他的每一句话都有重量——不是那种刻意的深沉，而是一种经过了思考之后才愿意说出口的认真。\n\n「你觉得诺特家族在战争中站了哪边？」有一天他问你。\n\n「我不知道，」你说，「但我觉得你不会告诉我。」\n\n「因为我不确定，」他说，「我自己也不确定。」\n\n你看着他。他是诺特家族的人——那个以精明著称的、在两边都下了注的家族。所有人都认为他的家族是机会主义者，没有立场，没有底线。\n\n但你看到的不是这样的他。\n\n你看到的他会在图书馆里帮一个低年级的学生找书。你看到的他会在走廊里不动声色地挡在一个被欺负的麻瓜出身学生面前。你看到的他会一个人坐在角落里，读那些和权力无关的、和立场无关的、只是关于知识本身的书。\n\n后来你知道了——从某个偶然的消息来源那里知道了——他在暗中帮了三个麻瓜出身的学生逃出了食死徒的控制范围。他从来没有跟任何人说过这件事。\n\n「为什么不说？」你后来问他。\n\n「说了又怎样？」他的声音很平静，「做的事已经做了。」\n\n「有区别。大家会知道你是好人。」\n\n他看着你。他的眼神里有一种你很少在别人身上看到的东西——不是骄傲，不是谦虚，是一种对「被认可」这件事的、真正的不在乎。\n\n「我不需要大家知道，」他说。他停了一下，看着你的眼睛，「我需要的……」\n\n他沉默了很长时间。长得让你以为他不会把那个句子说完了。\n\n「我需要你知道。」\n\n那是他说过最长的一段话。\n\n——\n\n后来你们在一起了。\n\n不是那种热烈的、大声的方式。你们的方式和你们认识的方式一样——安静的、缓慢的、在某一天你发现已经是了的那种。\n\n你们依然在图书馆的那个角落里坐着。依然是他看他的书，你看你的。只是现在，你们之间没有桌子了。\n\n有一天你问他：「你觉得我们是什么？」\n\n他想了很久。不是敷衍的那种「想」——是真的在想。他的手指在书的封面上来回摩挲着，眼睛看着窗外。\n\n「是那三张桌子，」他终于说，「不近，也不远。但那个位置——」\n\n他转过头看着你。\n\n「——只有你在。」"},oliver:{n:"奥利弗·伍德",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 2, "depth": 1, "bravery": 2, "rebel": 1, "humor": 1, "adventure": 3, "morals": 2, "wisdom": 1},t:["热血执着", "目标导向", "全力以赴", "不善言辞"],r:"他对魁地奇的执着让所有人觉得他疯了——但你能看到，那种执着恰恰是他最可靠的地方。",tt:"《比魁地奇更重要》",tb:"你第一次见到奥利弗·伍德，是因为你替他找回了一个飞走的球。\n\n那天你坐在魁地奇球场旁边的草地上看书。阳光很好，微风不燥，周围只有偶尔飞过的几片树叶和远处球场上那些模糊的叫喊声。你把书翻到了第三章，正准备读下一段——\n\n然后一个快球从球场的方向冲了过来，像一颗红色的炮弹，笔直地朝你的方向飞来。\n\n你本能地跳了起来，单手接住了它。球的表面还带着风的速度，在你的手心里微微震了一下。\n\n然后你听到一个声音从天上传来——\n\n「你为什么不去打魁地奇？」\n\n你抬头看。一个男生骑着扫帚从天空降下来，稳稳地落在你面前。他比你高一个头，棕色的头发被风吹得乱七八糟，眼睛是那种你从未见过的、近乎认真到不可思议的眼神。\n\n「不感兴趣，」你说，把球还给他。\n\n他接过球，用一种你从未见过的、对一个人审视的方式看了你很久。不是那种看美女或者帅哥的眼神——是那种教练看一个被埋没的天才的眼神。\n\n「可惜了。」他说。\n\n然后他跨上扫帚，飞回了球场。\n\n你站在原地想了一秒，然后重新坐下来，翻开了书。但第三章的那一页你已经看不进去了。\n\n——\n\n后来你们认识了。不是因为魁地奇——虽然那确实是你们第一次见面的原因——而是因为图书馆。\n\n你在魔药学那排遇到了他。他站在一堆关于飞行理论和空气动力学的书前面，手里拿着一本厚厚的、满是图表的教材，表情非常认真。\n\n「你在研究这个？」你问。\n\n「嗯，」他说，眼睛没有从书上抬起来，「我在分析不同天气条件下扫帚飞行的阻力系数。你看不出来吗？下雨天的空气密度比晴天大百分之零点三，这意味着在雨天比赛的时候，追球手的出手角度需要调整零点五度。」\n\n你看着他。这个人对魁地奇的执着已经超过了正常人对任何事物的热情程度。每一次训练前他都能分析出十七种可能失败的场景，然后一一制定对策。所有人都说他疯了。\n\n但你不这么觉得。\n\n你觉得那种执着很动人——一个人能这么认真地对待一件事，意味着他对所有他在乎的事都会这样。如果你能成为他在乎的事情之一……\n\n「你这么认真，不累吗？」你问。\n\n「累，」他说，终于从书上抬起了眼睛看着你，「但不认真更累。」\n\n——\n\n有一次训练，他在球场上摔了一跤。\n\n不是那种从高空坠落的危险摔跤——只是在低空飞行的时候被一阵突如其来的侧风刮了一下，扫帚失衡，他重重地摔在了草地上。\n\n所有人都围了上去。他的队友们、其他学院的围观者、甚至还有几个教授——所有人都围在球场中央那个趴在地上的身影旁边。\n\n你绕过所有人，从人群的外围走了进去。你在他旁边蹲下来，把一块巧克力放在他的手边。\n\n他抬起头看你。他的额头上有一块淤青，但他的眼睛是清醒的。\n\n「我不需要安慰。」他说。\n\n「我没有安慰你，」你说，「我只是把巧克力放在了正确的位置。」\n\n他沉默了一下。然后他拿起巧克力，剥开包装纸，咬了一口。\n\n「你总是知道该做什么。」他说。\n\n「不是，」你说，「我只是在看你。」\n\n那是他第一次抬起头——不是在分析比赛局势，不是在讨论战术——只是抬起头，用一种不在思考魁地奇的眼神看你。\n\n——\n\n霍格沃茨最后一届魁地奇赛季结束的那晚，他找到了你。\n\n他浑身是泥——不是因为摔跤，是因为整个球队在庆祝胜利的时候把他推进了泥坑里。他的手里拿着一块巧克力——不是普通的巧克力，是蜂蜜公爵特供的那种、包装上带着金边的巧克力。\n\n「还你的。」他说，把巧克力递给你。\n\n「这不是我的。」\n\n「算利息，」他说，「谢谢你一直在看。」\n\n你接过巧克力，看着他被泥巴糊了半张脸的样子，笑了。\n\n然后他坐到你旁边——坐在看台的台阶上，两个满身泥巴的人，看着球场的灯一盏一盏地熄灭。\n\n「比赛结束了，」他说，声音在安静的球场里显得格外清晰，「接下来的事，我比魁地奇还认真。」\n\n你知道他在说什么。\n\n「那你可能需要比现在更多的巧克力储备。」你说。\n\n他笑了。\n\n那是你第一次看到他在球场之外——不是在训练场，不是在图书馆——放松地笑。那种笑不是因为他赢了比赛，不是因为他分析了什么数据。是因为他终于可以不用想魁地奇了。\n\n是因为他终于可以把注意力放在别的事情上了。\n\n比如你。"},blaise:{n:"布莱斯·扎比尼",h:"斯莱特林",hc:"house-s",g:"male",s:{"loyalty": 1, "depth": 2, "bravery": 1, "rebel": 1, "humor": 1, "adventure": 1, "morals": 1, "wisdom": 2},t:["从容优雅", "旁观者", "不轻易表态", "有品味的冷淡"],r:"他是人群里永远冷静的人——而你是唯一让他失控的人。你们的相处是安静的吸引，不需要大声证明。",tt:"《我从不靠近，但我一直在》",tb:"布雷斯·扎比尼是那种你很难真正认识的人。\n\n在斯莱特林，他永远是最从容的那个——不争，不抢，不参与任何派系的争斗，不站在马尔福身边也不站在其他任何人身边。他只是站在那里，用一种你说不清楚是漠然还是洞察的眼神看着所有人。像一座旁观一切的灯塔，但它的光只照向它自己决定照向的地方。\n\n你第一次见到他，是在斯莱特林公共休息室里的一个周三晚上。\n\n那天晚上休息室里很吵。马尔福在讲他家新买的扫帚，帕金森在讨论某个八卦，达芙妮和她的朋友们在角落里压低声音聊着什么你听不清的话题。整个休息室弥漫着一种你不太习惯的、紧绷的社交气氛。\n\n你走到窗边的沙发那里，想找一个相对安静的角落坐下来。然后你发现，那个角落已经有人了。\n\n布雷斯·扎比尼坐在靠窗的位置上，手里拿着一本书，眼睛却不在书上——他在看窗外的黑湖。黑湖在月光下是一种深暗的蓝黑色，水面上有轻微的波纹。他看着那片湖水的神情是平静的，平静得近乎漠然。\n\n你在他旁边的沙发上坐了下来，也没有说话，拿出自己的羊皮纸，开始写当天没有写完的论文。\n\n他没有抬头看你。你没有打招呼。就这样，你们一人看窗外，一人写论文，在那个吵闹的休息室的角落里，维持了一个奇特的安静。\n\n过了大概一个小时，他开口了，声音很低，没有转过头：\n\n「你知道你是第一个不问我在想什么的人吗？」\n\n你想了一秒，回答道：「我不需要知道。我只是不想坐在那边。」\n\n他沉默了一下。\n\n「有意思，」他说，然后重新看向了窗外。\n\n——\n\n从那以后，你们有时候会在同一个角落里出现。不是约好的——只是你们都习惯了那个位置，都习惯了那种沉默的同处。\n\n他开始记住你说过的事。\n\n那是你很晚之后才发现的。你有一次随口提到你喜欢某本书，说它的注解写得好。三周后，你发现那本书的续集出现在了你的桌上，没有附任何说明。\n\n「这是你的吗？」你去问他。\n\n「你说那本书注解好，」他说，眼睛没有从自己的书上移开，「续集的注解更好。」\n\n你看着他。他像什么都没有发生一样，继续看他的书。\n\n「谢谢，」你说。\n\n「嗯。」\n\n后来你注意到了更多这样的事。你提过一次你的论文引用来源不够，三天后你的书桌上出现了一份相关的资料清单——是手写的，字迹工整，来源不明。你抱怨过一次斯莱特林公共休息室的壁炉火力不够，两天后那个壁炉不知道被谁施了一个增温咒，比以前暖和了很多。\n\n他从不声张。从来不会走过来说「那是我做的」「那是我给你的」。他做了，然后什么都不说。\n\n——\n\n那一次你们之间发生了一件不大不小的争执。\n\n不是因为他做了什么——是因为他什么都没有做。那天你遇到了一点麻烦，一件需要一点点支持的事。你等了一整天，等他来说什么、做什么，但他什么都没有。\n\n「你总是这样，」你终于在走廊里叫住了他，压着火气，「你永远不靠近任何人。你只是在旁边看着，像个局外人。」\n\n他转过身看你。他的表情没有变，但他的眼睛里有一瞬间出现了一种你以前从未见过的东西——不是愤怒，不是委屈，更像是一种「终于等到这一刻」的复杂。\n\n他沉默了很久。走廊里的人都从他们身边走过，没有人注意到这两个站在角落里的人。\n\n「我靠近了，」他最后说，声音很平，「只是你不知道那对我来说意味着什么。」\n\n你愣了一下。「那对你意味着什么？」\n\n他没有立刻回答。他看着你，看了很久，像是在权衡某件他一直没有说出口的事。\n\n「我的母亲，」他说，「结过七次婚。每一任丈夫都在婚后不久去世了。没有人能证明什么，但所有人都知道是怎么回事。所以我从很小的时候就学会了——不要靠近任何人。因为你靠近了，就可能失去。而我失不起。」\n\n他停了一下。\n\n「但是你，」他说，「我计算了一下失去你的代价和不靠近你的代价。前者更大。所以——」\n\n他把眼神移开，看向走廊另一头。\n\n「我靠近了。以我能做到的方式。」\n\n你站在那里，半天没有说话。\n\n「那那本续集，」你最终说，「那份资料清单，那个壁炉的增温咒——」\n\n「都是。」\n\n「还有别的吗？」\n\n他想了一下。「你上次去图书馆找不到的那本《高级黑魔法防御理论》，是我提前帮你预约了的。你们草药课那次实验失败，是因为有人动了材料的摆放顺序，我帮你改回去了所以最后成功了。还有那次你在走廊里差点绊倒，是因为地板上有一个我发现了但来不及提醒你的绊脚咒，我在你绊到之前帮你提前解掉了。」\n\n你看着他。\n\n「你一直在看着我。」\n\n「是，」他说，「但不只是看。」\n\n「那你靠近我多少了？」\n\n他想了很久，然后说了一句话：\n\n「把续集放在你桌上的那一天，就已经是全部了。」"},bill:{n:"比尔·韦斯莱",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 2, "depth": 2, "bravery": 3, "rebel": 2, "humor": 1, "adventure": 3, "morals": 2, "wisdom": 2},t:["勇敢冒险", "古灵阁解咒师", "酷且可靠", "外冷内热"],r:"他见过世界上最危险的地方，但回到你身边时，会把最有趣的冒险故事讲给你听。",tt:"《一千个回来的方式》",tb:"你第一次见到比尔·韦斯莱，是在古灵阁外面的台阶上。\n\n那天你刚结束一个培训项目，拎着包从古灵阁的正门走出来。初秋的风从对角巷的尽头吹过来，卷起了几片枯黄的叶子。你在台阶上停下来，准备翻找你的交通路线图——然后撞上了一个迎面走来的人。\n\n不，是他撞上了你。他走路的速度很快，步子很大，显然是一个习惯了在沙漠里赶路的人，而不是一个习惯了在对角巷的拥挤人群中行走的人。你们撞在一起，你的包差点脱手飞出去。\n\n「对不起，」他说，伸手帮你稳住了包，「我没注意看路。」\n\n你抬起头看他。他很高，皮肤晒成了一种深深的金棕色，头发是韦斯莱家族特有的红色，但比你见过的任何一个韦斯莱都要长，扎成了一个松散的马尾，鬓角有几根头发被风吹散了。他手腕上戴着几个皮绳编成的手环，其中一个上面挂着一个小小的象形文字符号。\n\n他从埃及回来，你一眼就看出来了。\n\n「没事，」你说。\n\n他把你的包稳住之后，就继续走了。但在经过你身边的时候，他转过头来看了你一眼。\n\n不是那种刻意的回头——是那种「我在路过这个世界的时候，突然注意到你了」的回头。就一眼，但那一眼停留的时间比礼貌性的目光接触稍微长了一点点。\n\n然后他走了。\n\n你站在台阶上，看着他的背影消失在对角巷的人流里，心里有一个声音在说：这个人有故事。\n\n——\n\n后来你在古灵阁工作，在破除诅咒的部门。他也在那里，是首席破咒师，专门负责中东和北非地区的古代墓穴和文物。\n\n你们的工作有交集——他从埃及挖来的东西有时候需要你们部门来做最终评估和处理。每隔几个月，他会从外地回来，带着一批新的文物、一身新的晒伤、和一堆听起来不可思议但你愿意相信的故事。\n\n他会敲你的办公室的门：「你有兴趣听一个故事吗？」\n\n你总是有兴趣的。\n\n他会坐在你桌子对面的椅子上，从外套口袋里掏出一个用布包着的小东西——有时候是一块刻着古埃及象形文字的石头，有时候是一个小小的、表面已经磨损的护身符，有时候是一张在无人沙漠里拍到的、画面里有不该出现的东西的照片——然后开始讲。\n\n他讲故事的方式很特别。不是那种绘声绘色的、刻意制造悬念的讲法——他只是用平静的声音，把他看到的、听到的、感受到的一件一件地告诉你。像是在把远方的风带回来，放在你桌上。\n\n你每次都听到最后。\n\n——\n\n然后是那一次任务，他受伤了。\n\n那是一个在开罗附近发现的古代法老墓穴，里面有复杂的多层魔法陷阱。他的队伍破解了大部分，但最后一层是他们没有遇到过的类型——一种结合了古代象形魔法和现代诅咒的复合陷阱。他触发了它。\n\n他回来的时候，脸上有了新的疤痕。\n\n不是小小的划伤，是那种深的、从左颊一直延伸到下巴的伤痕，皮肤在愈合过程中留下了永久的纹路。\n\n他在医疗室里住了三天。第一天，他的家人来了——莫丽夫人哭了，亚瑟先生拍了他的肩膀，弗雷德和乔治讲了几个蹩脚的笑话。\n\n第二天，同事来了，祝他康复，说了一些正式的话，然后走了。\n\n第三天，你去了。\n\n你没带花，没带巧克力，没有准备任何慰问品。你只是走进去，在他旁边的椅子上坐了下来，拿出一本书，开始看。\n\n「你不问我怎么样了？」他过了一会儿说。\n\n「你怎么样了？」你说，眼睛没有从书上移开。\n\n「比死好，但不如去埃及之前。」\n\n「那还好。」你翻了一页书。\n\n沉默了很久。他说：「你真的不介意？」\n\n你放下书，看着他。看着他那张有新疤痕的脸，看着他那双被埃及的阳光晒成了暗金色的眼睛，看着他那个在所有疼痛和失落之后依然保持着某种平静的神情。\n\n「我没在看你的脸，」你说，「我在看你。」\n\n他看着你，什么都没说。但他的表情变了——那种他一直带着的、经年累月旅行之后形成的、属于一个习惯了独自出发的人的戒备感，在那一刻薄了一点。\n\n——\n\n半年后，他问你愿不愿意跟他去埃及。\n\n「不是工作，」他说，「就是看看。带你去我去过的地方。」\n\n「为什么是我？」\n\n他想了一下。「因为你是第一个在我讲故事的时候，真的在听的人。」\n\n你说好。\n\n那趟旅行你们去了好几个地方。你们在金字塔旁边等到了日落，看着天空从橙色变成紫色变成深蓝。你们在开罗的市集里迷路了两个小时，用各种蹩脚的方式和当地人沟通，最后买回了一堆你们都叫不出名字的香料。你们在沙漠里用他同事的手机拍了一张大逆光的合照，糊到几乎看不清脸。\n\n回来的路上，你们坐在从开罗到伦敦的魔法交通上，窗外是黑色的夜空和稀疏的星光。\n\n「我每次出门，」他说，「都希望回来的时候，有人在等。」\n\n「我每次都在，」你说，「你每次回来，我都在。」\n\n「那以后……」他停了一下，「你可以一直在吗？」\n\n你看着他。看着他那张有疤痕的、被风和阳光雕刻过的、在夜光下显得格外柔和的脸。\n\n「可以，」你说，「但你得多带一点故事回来。」\n\n他笑了。「一千个，够不够？」\n\n「先从一个开始。」\n\n他想了想，从口袋里掏出了那个刻着象形文字的小石头——那个他第一次来找你讲故事的时候带来的那一块——放在你的手心里。\n\n「这个，」他说，「是第一个。」\n\n「讲给我听。」\n\n「是一个关于回家的故事，」他说，「主角走了很远，最后发现，他要找的地方不是一个地方，是一个人。」\n\n你握着那块石头，感受着它上面还残留的、来自埃及沙漠的温度。\n\n「那他找到了吗？」你问。\n\n「找到了，」他说，「就在今天。」"},percy:{n:"珀西·韦斯莱",h:"格兰芬多",hc:"house-g",g:"male",s:{"loyalty": 3, "depth": 2, "bravery": 2, "rebel": 0, "humor": 0, "adventure": 0, "morals": 3, "wisdom": 2},t:["规则控", "责任心极强", "不善表达关心", "默默扛下所有"],r:"他看起来只在乎规则——但在规则之外，他比任何人都更在乎你。他的关心是默默的、笨拙的、但从未缺席的。",tt:"《你的名字在最后一行》",tb:"你们第一次认识，是因为一个拼写错误。\n\n那天你刚提交了一份给魔法部国际巫师联合会部门的申请报告。内容你写了三遍，每一遍都仔细地检查过——或者说，你以为你仔细地检查过。你把报告放在了出件盒里，然后去吃午饭了。\n\n下午回来的时候，你在自己的桌上发现了一张便条纸。\n\n便条纸上用一笔一划的、极其工整的字迹写了一个词：你在报告第三页第七行写的那个词，正确的写法应该是这样的，然后是那个词的正确拼写。便条纸的最下方，只有两个字母：P.W.\n\n你拿着那张便条纸，想了一会儿。\n\n大部分人要么直接走过来告诉你，要么假装没看见。他选择了第三种方式：告诉你，但不让你当众出糗。他匿名写了一张便条，把正确答案放在你的桌上，让你自己偷偷改掉。\n\n你重新提交了报告，在第三页第七行改了那个词。\n\n然后你去找了一个叫P.W.的同事。\n\n——\n\n柏西·韦斯莱是国际巫师联合会部门的一名行政官员。他的办公桌永远是整齐的，文件按照时间顺序和主题分类摆放，羽毛笔并排站在笔筒里，连纸张的摆放角度都是一致的。\n\n你站在他的办公桌前，把那张便条纸放在了他桌上。\n\n「谢谢你，」你说。\n\n他抬起头看你。他戴着眼镜，眼镜后面是一双比你预期的更认真的眼睛。\n\n「那只是一个拼写错误，」他说，「如果那份报告被递到上级那里，会影响整个部门的形象。」\n\n「我知道，」你说，「所以才谢谢你。」\n\n他把那张便条纸往边上推了推，「不客气，下次注意。」然后低下头继续看他的文件。\n\n那是你第一次见到柏西·韦斯莱——在他的办公室里，在他那张整整齐齐的桌子后面，用那种一丝不苟的、让你忍不住觉得有一点点拘谨的眼神看你。\n\n但你记住了那双眼睛背后的认真。\n\n——\n\n你开始注意他。\n\n你注意到他每天都是第一个到、最后一个离开的那个。不是因为要加班，是因为他认为把事情做完整比按时下班更重要。你注意到他会在同事的报告里发现问题，但他不会当众指出，而是选择私下、以书面的方式告知——就像他对你做的那样。你注意到他的午餐永远是自己带的，用一个整整齐齐的餐盒装着，在固定的时间吃完，然后固定地在餐后看二十分钟的文件。\n\n所有人都说他古板。说他只在乎规则，只在乎仕途，没有人情味。\n\n你不觉得。\n\n你看到他在节假日前给下属的桌上留了提醒纸条，让大家记得把未完成的文件归档。你看到他在一个低年级员工被上司不公平对待之后，默默在自己权限内调整了那个员工的评级。你看到他趁没人注意的时候，把一个同事遗落在会议室的外套送回了那个人的办公桌上。\n\n他做这些事的方式和放回那张便条纸的方式是一样的：不声不响，不求回报，但一笔一划，认真而用心。\n\n「你不累吗？」有一次你趁他一个人在茶水间倒水的时候问他。\n\n他转过身看你，拿着一个马克杯，表情有一点点困惑——像是不理解你的问题。\n\n「做该做的事，」他说，「不算累。」\n\n你看着他。想了一会儿，说：「那做没有人要求你做的事呢？」\n\n他沉默了一下。「那也不算累。」他说，然后拿着他的马克杯走了。\n\n——\n\n战争来了的时候，他站在了错误的那边。\n\n不是因为他相信福吉或者乌姆里奇，而是因为他不相信哈利。因为他觉得遵守体制才是正确的方式，因为他在那些规则和秩序里找到了他认为正确的东西，然后为它们付出了代价——和家人决裂，和良知决裂。\n\n他后来改变了。是在他看到了足够多的真相之后，在他意识到他所信任的体制本身已经被腐蚀之后。\n\n战争结束后，他回到了韦斯莱家。\n\n你在格里莫广场的附近偶然看到了这一幕——他站在那扇橙色的、被植物爬满了的大门前，犹豫了很久。他的手抬起来，停在门把手的位置，又放下，又抬起来。\n\n然后他敲了门。\n\n莫丽·韦斯莱开了门。然后他们就都哭了。\n\n——\n\n后来有一天，你和他一起坐在魔法部食堂里吃午饭——你已经记不清是什么原因让你们第一次一起吃午饭的，但那之后它就成了某种不成文的惯例。\n\n「那天敲门之前，」你说，「你在外面站了多久？」\n\n他想了一会儿。「差不多半个小时，」他说，「我一直在想最好的措辞。」\n\n「然后呢？」\n\n「然后我意识到——有些话没有最好的措辞。」他把眼镜扶了扶，「只有说出来和没说出来的区别。」\n\n你点了点头。\n\n「那张便条纸，」你说，「我还留着。」\n\n他愣了一下。「那张纸有什么好留的？那只是一个拼写错误提醒。」\n\n「你的名字在最后一行，」你说，「P.W.两个字母。我看到那两个字母的时候，就想：我要记住这个人。」\n\n他看着你。他的表情里有一种你很少在他身上见到的东西——不是那种他在处理文件时的冷静，不是那种他在讨论部门规则时的严肃，而是一种更柔软的、不知道该怎么接这句话的困窘。\n\n他把那个装着午餐的餐盒盖上，认认真真地放到桌角，然后伸出手，把你的手放在了他的手心里。他的手掌是干燥的、温热的，握住你的方式是认真的，像是他做所有事情时的那种认真。\n\n「谢谢你，」他说，「我一直觉得自己不太擅长被人看见。」\n\n「我知道，」你说，「但你很擅长看见别人。」\n\n他沉默了一会儿，然后说了一句话。那句话他说的很轻，轻得像是一个他只愿意说给你听的秘密。\n\n「你是第一个把那件事当成值得留着的事的人。」\n\n「那以后你做的所有事，」你说，「我都会记得。」"},luna:{n:"卢娜·洛夫古德",h:"拉文克劳",hc:"house-r",g:"female",s:{"loyalty": 2, "depth": 3, "bravery": 2, "rebel": 2, "humor": 1, "adventure": 3, "morals": 2, "wisdom": 3},t:["独特视角", "纯真无畏", "温柔坚定", "看到别人看不到的"],r:"她能看见你的全部——脆弱、恐惧、连你自己都不敢承认的部分——而她不会评判你，只会说\"这很正常\"。",tt:"《只有你能看见我》",tb:"你第一次见到卢娜·洛夫古德，是在霍格沃茨特快列车的第四节车厢。\n\n前三节车厢都满了，你推开第四节的门，看到了一个独自坐着的女孩。她头上戴着一串萝卜形状的耳环，手里捧着一本上下颠倒的《月刊预言家》。她读得很认真，嘴唇微微动着，像是在默念什么。\n\n列车外的所有学生都挤在走廊里聊天，笑声一阵一阵地从门缝里飘进来。她坐在那里，像一块置身于涨潮海滩的礁石，被人群的声浪包围着，但她自己是安静的。\n\n「这里有人坐吗？」你问。\n\n她抬起头看你。她的眼睛是浅灰色的，像是装了一点雾气在里面。她把那本上下颠倒的月刊预言家放到一边，摇了摇头。\n\n你坐了下来。然后你忍不住问：「那本书……为什么倒过来读？」\n\n「因为正过来的话，字里行间的东西会被遮住，」她说，声音是平静的、不辩解的，「倒过来，才能看到真正重要的部分。」\n\n你愣了一下。\n\n大多数人遇到这个答案会笑——笑她荒唐，笑她离奇，笑她那些听起来不着边际的理论。但你坐在那里，认认真真地想了几秒钟，然后点了点头。\n\n「有道理。」你说。\n\n她愣了一下。然后她笑了——不是那种礼貌的、表演给别人看的笑，是一种真正被触动的笑，像是冬天里突然照进来的一束阳光。\n\n「你是第一个说有道理的，」她说，「大家通常觉得我在说奇怪的话。」\n\n「也许是他们不知道怎么倒过来看事情。」\n\n——\n\n你们就这样在那节车厢里坐到了霍格沃茨站。你们聊了很多——关于那些她相信存在的神奇生物，关于她父亲办的那本很小众的刊物，关于她认为月光下的黑湖里住着一种会唱歌的鱼类。\n\n你没有质疑任何一件事。\n\n不是因为你全都相信——你有自己的判断，有自己的知识体系——而是因为你发现了一件事：她说的那些话里有一种内在的逻辑，一种和主流世界观不一样但自洽的逻辑。\n\n就像那本倒过来读的月刊预言家。也许倒过来看，确实能看到正过来看不到的东西。\n\n——\n\n然后到了五年级，她消失了。\n\n是在冬天，在圣诞假期之后。当所有人回到霍格沃茨的时候，她没有回来。没有任何解释，没有任何说明。有人说她的父亲惹麻烦了，有人说她自己出了事，但谁也不确定。\n\n你在她常坐的那节车厢里找到了她留下的东西——一只手套，浅灰色的，还带着她手心的温度。一只，不是一双。另一只不知道在哪里。\n\n你把那只手套放进了口袋里。\n\n你不知道她在哪里，不知道她是否安全，不知道她什么时候会回来。但你把那只手套一直放着，放在口袋里，像是某种没有说出口的承诺。\n\n——\n\n战后，她出现在了霍格沃茨的入口处。\n\n好像从来没有离开过。好像一切都没有发生过。她站在废墟和尘土之间，穿着那件浅色的、飘逸的长裙，头上依然戴着那串萝卜耳环。\n\n你穿过人群走到她面前。\n\n「你的眼睛很亮，」她说，第一句话就是这个。\n\n「什么意思？」\n\n「等待一个人的时候，眼睛会亮的，」她说，那种平静的、不辩解的语气，「我在马尔福庄园的时候也是这样。我知道外面有人在，只要想着有人在等着，眼睛就会亮。」\n\n你从口袋里拿出那只手套，递给她。\n\n她看着那只手套，眼睛里出现了一种你很难描述的东西——不是惊讶，更像是「果然如此」的平静。\n\n「你保管了多久？」她问。\n\n「很久。」\n\n她把手套戴上，然后抬起头，用那双浅灰色的眼睛看着你。\n\n「世界上的大多数事情，」她说，「都是值得等的。」\n\n「是的，」你说，「你也是。」\n\n她伸出手，轻轻握住了你的手指。她的手很凉，但握得很稳。\n\n「你相信弯角鼾兽吗？」她问——那个离奇的、只存在于她的世界里的神奇生物。\n\n「不知道，」你说，「但如果你说它存在，我愿意相信。」\n\n她的眼睛亮了。不是那种期待被认同的亮，是一种被真正理解的亮。\n\n「这就是为什么你能看见我，」她说，「大多数人看的是我说的话——他们觉得那些话荒唐。但你看的是我这个人。」\n\n「我一直都能看见你，」你说，「从那节车厢开始。」\n\n——\n\n后来她去追寻那些神奇生物，去那些没有人去过的地方，去寻找那些只存在于她脑海里的奇迹。你跟着她。\n\n不是因为你相信所有的奇迹都会实现——而是因为在她身边，世界比其他任何地方都要宽广。\n\n月光落在远山上，银白的，像某种守护神的光。她把头靠在你肩上，说：「我知道。」\n\n你知道她在回答什么——那句你在那个废墟里说的话：你一直都能看见她。\n\n「我知道，」她说，「从你说有道理的那一刻开始，我就知道了。」"},ginny:{n:"金妮·韦斯莱",h:"格兰芬多",hc:"house-g",g:"female",s:{"loyalty": 2, "depth": 2, "bravery": 3, "rebel": 2, "humor": 2, "adventure": 2, "morals": 2, "wisdom": 1},t:["独立自信", "球场女王", "敢爱敢恨", "外柔内刚"],r:"她不需要被保护——她本身就是最强大的存在。并肩作战，互相挑战，然后赢。",tt:"《你不需要被保护》",tb:"你第一次真正注意到金妮·韦斯莱，是在三年级的魁地奇比赛上。\n\n那天格兰芬多对阵赫奇帕奇。你坐在看台的中间，手里拿着格兰芬多的旗帜——你自己是格兰芬多的人——看着球场上七个人从空中飞掠而过。\n\n然后你注意到了她。\n\n不是因为她打得最好——她那时候还是后备追球手，上场时间不长。你注意到她是因为那一次意外。\n\n她追球的时候，和另一个球员的扫帚碰撞了一下，直接从扫帚上摔了下来。不高，大概五六英尺的位置。但那个撞击的力度足够让你倒吸一口冷气。\n\n她在地上坐了三秒。三秒，就三秒。\n\n然后她站起来，爬上扫帚，继续追球。\n\n没有人扶她，她也没有等任何人扶她。裁判示意她可以去医疗区检查，她摇了摇头，重新冲进了场中。\n\n你坐在看台上，看着她重新飞起来的背影，心里有一个声音在说：这个人活着的方式，和所有人都不一样。\n\n——\n\n后来你们在邓布利多军里认识。\n\n第一次集会，哈利在教大家守护神咒，你站在靠窗的位置，正在尝试让魔杖顶端出现一点银白色的光。\n\n然后你听到身边有人说：「你的手腕角度不对。」\n\n你转过头。是金妮。她站在你旁边，用一种认真但不咄咄逼人的眼神看着你的手。\n\n「哪里不对？」你问。\n\n「往上调两度，」她说，「守护神咒需要力量，但不是蛮力——是方向对了之后的精准发力。」\n\n你按她说的调整了角度，重新念了一遍咒语。这一次，魔杖的顶端出现了一缕明显更强的银白色光。\n\n「好，」她说，「再来一次。」\n\n你后来知道，她是整个邓布利多军里咒语最熟练的成员之一——不是因为她有什么特别的天赋，而是因为她不停地练，练到她自己满意为止。\n\n——\n\n你真正走进她的内心，是在弗雷德死后的那段时间。\n\n那是战后最沉重的一段日子。韦斯莱家的人全都沉浸在悲伤里，各有各的方式——莫丽·韦斯莱哭，亚瑟·韦斯莱沉默，乔治把自己关在房间里。\n\n而金妮，每天早上第一个起来。\n\n她会在厨房里把早餐准备好，把每个人的份量分好，把桌子摆整齐。然后她会把弗雷德那份也摆好——他的那个位置，那个盘子，那个杯子，一切如常。\n\n然后她自己一个人坐到后院去，看着那片她从小长大的草地，什么都不做，只是看着。\n\n你有一天早上跟出来，在她旁边坐下来。\n\n「你不用看着我，」她说，没有转过头。\n\n「我不是在看你，」你说，「我只是在这里。」\n\n她沉默了一会儿。然后她把头靠在了你的肩上。\n\n那是你第一次在她面前，看到了金妮·韦斯莱这个人——不是那个球场上从来不需要人扶的追球手，不是那个教你咒语时一丝不苟的邓布利多军成员，而是一个很累、很需要人的，普通的人。\n\n——\n\n你们之间的第一次真正的争吵，是因为你试图保护她。\n\n那是一次危险的任务，你知道她要去做一件你认为危险程度超出了必要范围的事，你想拦她。\n\n「你不需要去，」你说，「有别人可以——」\n\n「有别人可以，」她打断了你，声音里有一种冷静的、不容置疑的硬，「但我要去。不是因为没有别人，是因为那件事是对的，而我有能力做。」\n\n「我不想你受伤。」\n\n「这不是你来决定的，」她说，「你可以担心我，但你不能因为担心我就让我缩回去。我不需要被保护，我需要被信任。」\n\n你沉默了很久。\n\n她说的对。你知道她说的对。但知道是一回事，接受是另一回事。\n\n「好，」你最终说，「你去。但你要告诉我你的计划。」\n\n「因为你信任我？」\n\n「因为我信任你，而且我想帮忙。」\n\n她看了你很久。然后她的嘴角动了一下，那种她平时很少让人看到的、带着一点柔软的笑。\n\n「那你就在这里等着，」她说，「等我回来。」\n\n她回来了。带着一身的泥巴和一块新的淤青，但她回来了。\n\n「我说了嘛，」她在你面前站定，抬起下巴，「不需要你保护。」\n\n「我知道，」你说，「但还是很高兴你回来了。」\n\n她愣了一下，然后走过来，用力地抱了抱你。她抱你的力气很大，像是要把所有的担心和委屈都挤进这个拥抱里。\n\n「你很烦，」她说，「但我不后悔喜欢你。」\n\n「我也不后悔，」你说，「就算你让我担心得要命也是。」"},hermione:{n:"赫敏·格兰杰",h:"格兰芬多",hc:"house-g",g:"female",s:{"loyalty": 3, "depth": 2, "bravery": 3, "rebel": 1, "humor": 0, "adventure": 2, "morals": 3, "wisdom": 3},t:["极致聪明", "行动派", "忠诚坚定", "不服输"],r:"她永远比你想得多一步——但当你提出她没有想到的观点时，她会眼睛一亮。智力交锋加情感默契。",tt:"《比书上写的更重要》",tb:"你第一次见到赫敏·格兰杰，是在霍格沃茨开学第一天的特快列车上。\n\n那时候你们还不认识，但你注意到了她——一个女孩坐在靠走廊的位置上，面前摊着一本魔法史的教材，用荧光笔把她认为重要的段落划出来。她的眼睛快速地在字里行间移动，偶尔停下来在书边上写一行小字。\n\n周围所有人都在认识新朋友，聊天，分享零食，而她在看书。\n\n不是装样子的那种看——是真的在看。\n\n你在走廊里站了一会儿，看着她。心里有一个声音在说：这个人很认真。不是那种规规矩矩的认真，是真正对知识本身有欲望的认真。\n\n——\n\n真正认识她，是在魔药课上。\n\n那节课，斯拉格霍恩教授给大家出了一道要求应用古代魔法师的熬制理论的问题。班上大多数人都在翻课本，只有赫敏和另外两三个人举起了手。\n\n然后赫敏回答完问题之后，做了一件让你印象深刻的事——她没有停下来，而是继续补充了一段课本上没有的、来自她自己查阅的额外资料。\n\n斯拉格霍恩教授很高兴，但赫敏的表情不是「我终于被表扬了」那种表情——是一种「我终于把这个问题说完整了」的满足感。\n\n课后你走上前。「你刚才补充的那一段，」你说，「是你自己查的？」\n\n「嗯，」她说，合上书，「教材上的描述太简略了，我觉得不够准确，所以去图书馆找了原始文献。」\n\n「你不觉得把那段说出来有点……超范围了吗？同学们可能觉得你在卖弄。」\n\n她愣了一下。「但那是对的，」她说，「如果我知道正确的信息，为什么不说出来？」\n\n「有时候，让别人感受到就够了，」你说，「不需要把所有东西都说完整。」\n\n她看了你一眼。那不是「我不服」的眼神——是「你这个人有点意思」的眼神。\n\n——\n\n后来你们越来越熟，因为你们经常在图书馆遇到。你们的论文写作风格完全不同——她会写二十页然后精简到十页，你会写五页然后把每一句话都磨到最准确——但你们的座位靠得越来越近，直到变成了固定的桌伴。\n\n你发现她最迷人的地方不是她的聪明，而是她的执着。\n\n她会为了搞明白一件事，把图书馆里相关的所有书都找出来，然后把它们全部看完。不是为了考试，不是为了向谁证明，而是因为她就是忍不住——她对这个世界上还有她不知道的事情感到一种近乎焦虑的不安。\n\n「你不觉得累吗？」你有一次问她，那时候已经是接近午夜了，图书馆里只剩下你们两个，「你已经找到答案了。」\n\n「我找到了这个问题的答案，」她说，「但这个答案引出了另外三个问题。」\n\n你看着她，看着她那张被台灯的黄光照着的、认真的脸。\n\n「你知道吗，」你说，「有时候找不到答案也是一种答案。」\n\n她停了下来，放下羽毛笔，想了一会儿。「这话听起来很像是在安慰我放弃。」\n\n「不是，」你说，「是在说——有些事情它就是开放的，没有终点。你可以一直走，但不必一直跑。」\n\n她看着你，表情变了一下——那种她意识到某件事的表情，你之后就学会了辨认那个表情。\n\n「我想到了一件书上学不到的事，」她说。\n\n「什么？」\n\n「怎么在一个人很累的时候，不问为什么，只是坐在那里。」\n\n「你学会了吗？」\n\n「不，」她说，「但我想学。」\n\n——\n\n战争来了。\n\n她做了最勇敢的事——用记忆消除咒抹去了父母对她的记忆，让他们去了澳大利亚。一个人承担了一切。\n\n你知道她做了这件事之后，去找了她。她在宿舍里，手里拿着一张她父母的照片，眼睛是干的——她已经哭过了，或者她选择不哭。\n\n你在她旁边坐下来。什么都没说。\n\n她看了你一眼。然后她开口了，声音很平静：「我知道这是对的，但我没有问他们愿不愿意。」\n\n「因为他们会说愿意，」你说，「所以你替他们做了决定。」\n\n「是，」她说，然后轻轻地，「谢谢你。」\n\n「我什么都没做。」\n\n「你只是坐在这里，没有问我为什么，没有说任何话，」她说，「我之前说我想学这个。你就在用实际行动教我。」\n\n——\n\n战后重逢，她找回了她的父母，恢复了那段被抹去的记忆。她告诉你那是她做过最难的事，不是因为施咒难，而是因为她必须自己一个人扛着那件事的重量，等待，然后亲手把记忆还给他们。\n\n「你学会了吗？」你问她。\n\n「学会了什么？」\n\n「在一个人很累的时候，不问为什么，只是坐在那里。」\n\n她看着你，眼睛里有光。「学会了，」她说，「从你那里学的。」\n\n然后她停了一下，说：「但我还在学另一件事。」\n\n「什么？」\n\n「你说的那个——找不到答案也是一种答案。」她说，「我还在学怎么接受这件事。」\n\n「需要帮忙吗？」\n\n「需要，」她说，「你能继续坐在这里吗？」\n\n「当然，」你说，「反正我哪也不去。」"},cho:{n:"秋·张",h:"拉文克劳",hc:"house-r",g:"female",s:{"loyalty": 2, "depth": 3, "bravery": 1, "rebel": 0, "humor": 0, "adventure": 1, "morals": 2, "wisdom": 2},t:["温柔内敛", "有故事的人", "安静但坚定", "感性的美"],r:"她是一个有故事的人——那些故事让她更美而不是更脆弱。你能理解她的沉默，她能理解你的热情。",tt:"《秋叶落下的地方》",tb:"你第一次见到秋·张，是在四年级的魁地奇比赛上。\n\n那场比赛是格兰芬多对决拉文克劳。你作为格兰芬多的支持者坐在看台上，手里举着红色的横幅。天空是那种刚刚入秋的灰蓝色，有几片云从球场上方飘过。\n\n然后秋·张飞了进来。\n\n她是拉文克劳的找球手——高挑，黑色的长发在飞行时被风拉成了一条线，动作流畅得像是她是从空气里生长出来的，而不是骑着扫帚。她飞行的方式和那个赛季所有其他选手都不一样——别人的飞行是充满力量的，而她的是充满精准的。\n\n你看着她，心里有一种感觉——不是那种「她好漂亮」的感觉，而是那种「这个人和世界之间有一种我看不太懂的关系」的感觉。\n\n后来比赛结束了。哈利找到了金色飞贼，格兰芬多赢了。但在人群散去之后，你在看台的角落里找到了一张笔记本——是从哪个口袋里掉出来的，上面用很工整的字写满了……不是魔法笔记，是关于那场比赛的观察记录。\n\n她记录了每一次追球线路，每一次高度的变化，每一次和对手的相对位置。用一种数据分析的方式，把整场比赛拆解成了一个个动作节点。\n\n那不是找球手的笔记。那是一个把魁地奇当作研究课题的人的笔记。\n\n——\n\n你把笔记本交还给了她。\n\n「谢谢，」她说，把本子接过去，脸上闪过了一丝不好意思，「你翻过了吗？」\n\n「翻过了，」你说，「但我不是那种会到处说的人。」\n\n她看了你一下。「大多数人看到这个会觉得奇怪。」\n\n「我觉得你把魁地奇研究得很认真。」\n\n「那是因为……」她停了一下，「我觉得这场比赛里有很多东西值得理解。不只是输赢，是那些空间和时间的选择。」\n\n「为什么要理解那些？」\n\n「因为理解了，下次就能做得更好，」她说，然后补充了一句，「就算这次我们输了。」\n\n你笑了。她看着你，然后也笑了——有一点点不好意思，但也有一点点真正放松的笑。\n\n——\n\n塞德里克死后，她变了。\n\n不是那种让人一眼就能看出来的变化——外表上，她还是那个认真的、工整的、每场比赛都会做飞行数据记录的秋·张。但如果你仔细看，你会发现她的眼睛里有一层薄薄的什么东西，像是一片玻璃蒙在上面，把她和世界之间隔开了一道距离。\n\n你在黑湖边找到了她，那个她经常一个人待的地方。\n\n「你为什么总是跟着我？」她问，没有转过头。\n\n「不是跟着你，」你说，「只是恰好你坐的地方，我也想坐。」\n\n她看了你一眼，然后——出乎你的意料——她把头靠在了你的肩上。\n\n你没有动。你没有说任何话。你只是坐在那里，看着黑湖，让她靠着。\n\n「他是那种很认真的人，」她过了很久才说，声音轻得像是从很远的地方传来的，「他做任何事都很认真。我以为那种认真可以保护他。」\n\n「也许没办法保护任何人，」你说，「但那种认真是真的。」\n\n「我知道。」她闭上眼睛，「所以更难忘。」\n\n你没有说「时间会好起来的」，也没有说「你会遇到更好的人」。你只是坐在那里，让秋天的风从你们头顶上过去，带走了一片又一片的黄叶。\n\n——\n\n战后，你们去了东方。\n\n不是一时冲动的决定，是一个缓慢的、在无数次黑湖边的对话之后自然产生的决定。她说她想离开英国一段时间，离开那些每一处角落都装着塞德里克记忆的地方。你说那你也去。\n\n她问：「为什么？」\n\n「因为你去的地方，我想看看，」你说，「而且我一个人旅行不太有意思。」\n\n她想了一下：「你不怕我某一天想起他然后大哭一场？」\n\n「那你就哭，」你说，「我在旁边。」\n\n你们在东方待了两年。然后你们在一条很安静的巷子里，开了一家小小的店，卖魁地奇纪念品和她在旅途中画的画——她学会了画画，把那些空间和时间的选择，用另一种语言记录了下来。\n\n「你还记得我们第一次见面吗？」有一天她问你。\n\n「记得，」你说，「你的笔记本掉了。」\n\n「你还记得我那天穿什么颜色的外套？」\n\n「蓝色，」你说，「拉文克劳的那种蓝。」\n\n她愣了一下。「你还记得颜色？」\n\n「我记得你所有的事，」你说，「只是从来不觉得需要说出来。」\n\n她看着你，看了很久。窗外的秋叶落下来，金色的，像魁地奇球场边的阳光——像那天她第一次飞进球场时的阳光。\n\n「我知道了，」她说，「为什么你把那个笔记本还给我的时候，我就记住你了。」\n\n「为什么？」\n\n「因为你是第一个没有笑的人。」"},pansy:{n:"潘西·帕金森",h:"斯莱特林",hc:"house-s",g:"female",s:{"loyalty": 2, "depth": 2, "bravery": 1, "rebel": 1, "humor": 2, "adventure": 1, "morals": 1, "wisdom": 2},t:["嘴硬心软", "社交高手", "被误解的忠诚", "斯莱特林的女王"],r:"所有人都觉得她刻薄——但你能看到她的刻薄是盔甲。你不需要她变得温柔，只需要在她露出真心时接住它。",tt:"《面具下的真话》",tb:"潘西·帕金森是那种你一眼就能看懂的人。\\n\\n至少在表面上是这样。在斯莱特林的公共休息室里，她永远是最活跃的那个——尖刻的评论，精准的嘲讽，永远站在马尔福身边，永远知道该说什么话才能让气氛更有趣也更残忍。\\n\\n所有人都觉得这就是她：一个典型的斯莱特林女孩，骄傲，尖刻，肤浅。\\n\\n你第一次认真看她，是在魔药课上。\\n\\n那天纳威的药水又搞砸了，冒出的绿色烟雾呛到了半个教室。大部分人都捂着鼻子往后躲，有几个斯莱特林的学生发出了毫不掩饰的嘲笑。\\n\\n潘西也笑了。但你在她的笑里看到了一点别的东西——一个微小的、在她嘴角出现的、不像是在嘲笑纳威、而更像是在嘲笑这个场面的停顿。\\n\\n她在笑，但那个笑不是她自己的。\\n\\n——\\n\\n后来你在图书馆的走廊里遇到了她。她靠在一个书架上，手里拿着一本《女巫周刊》——那种专门写八卦和明星恋情的杂志。但她没有在看杂志，她在看窗外。\\n\\n窗外的黑湖是暗蓝色的，月光照在水面上。她的表情是平静的——不是那种平时在斯莱特林公共休息室里装出来的、充满攻击性的平静，而是一种真正的、卸下了所有防御的安静。\\n\\n「你不看杂志？」你走过去问她。\\n\\n她把杂志合上，转过头看你。「无聊，」她说，「里面写的东西没有一件是真的。」\\n\\n「那你还买。」\\n\\n「因为所有人都买，」她说，然后停顿了一下，「如果我不买，他们会觉得我不正常。」\\n\\n你看着她。然后你注意到了她手里的杂志——封面上是一个魔法明星的独家照片，旁边用夸张的字体写着「爱情秘闻」。\\n\\n「你知道那个明星有五个孩子吗？」你说。\\n\\n「知道，」她说，「所有人都知道。但所有人都装作不知道。这就是我们生活的世界。」\\n\\n——\\n\\n从那天开始，你开始注意到潘西身上的矛盾。\\n\\n她会在走廊里用最难听的话嘲笑一个麻瓜出身的学生，但你会注意到她的眼睛并没有看那个人——她的眼睛在看别处，像是在逃避什么。\\n\\n她会在魔药课上和达芙妮一起八卦最新的消息，但你会注意到她并没有真正在听——她的手指在桌面上无意识地画着某种图案，像是她的心早就飞到了别的地方。\\n\\n她会在所有人面前扮演那个尖刻的、骄傲的斯莱特林女孩，但你会注意到——在那些没有人注意到的瞬间，她的面具会掉下来那么一秒钟。\\n\\n一秒钟的疲惫。一秒钟的真实。一秒钟的「我不想这样了」。\\n\\n——\\n\\n那一次你和她单独说话，是因为一件小事。\\n\\n那天你在禁书区的角落里找一本关于魔药理论的书，然后在同一个架子的另一侧看到了她。她站在书架前面，手里拿着一本很厚的、封面已经发黄的书——《魔法药剂与药水》的最早版本，一本非常珍贵的古董书。\\n\\n「你也对这本感兴趣？」你走过去问她。\\n\\n她没有立刻回答。她翻了一页，然后合上书，把它放回了书架上。\\n\\n「不是，」她说，「只是随便看看。」\\n\\n「但那本书的注解很有名，」你说，「第三版的注解是斯拉格霍恩教授年轻时候写的。你读过吗？」\\n\\n她愣了一下。「没有。」\\n\\n「我读过，」你说，「但我不确定那本书放在这里是不是正确的——它应该在三楼的珍本区。」\\n\\n她看了你一眼。然后她做了一件让你完全没有预料到的事——她把那本书从书架上拿了下来，递给你。\\n\\n「拿去，」她说，声音比平时低了至少两度，「你比较懂。」\\n\\n你接过书，翻开到第三版的注解那一页。然后你看到了——在书页的边缘，用铅笔写了一行很小的字，字迹很工整，像是写字的人在写的时候非常认真：\\n\\n「也许有一天，我也会配得上被真正了解。」\\n\\n你抬起头看她。她站在书架的另一侧，正在翻一本完全不同的书——女巫周刊。她的表情是平静的，像是什么都没有发生。\\n\\n但那行字是她写的。你知道。\\n\\n——\\n\\n战争结束之后的很多年里，潘西再也没有回过霍格沃茨。\\n\\n不是因为羞愧——不是因为她在最后时刻说出了「把哈利交出去」那句话。是因为她不知道该怎么面对那些她曾经伤害过的人。\\n\\n你找到了她。在伦敦的一条小巷子里，一家很小、没有人知道的书店里。\\n\\n她坐在柜台后面，手里拿着一本书，和那些在霍格沃茨的日子里你看到的她完全不一样——没有尖刻的表情，没有骄傲的姿态，只是一个安静的、在看书的人。\\n\\n「你怎么找到我的？」她问。\\n\\n「那本《魔法药剂与药水》，」你说，「我在珍本区的第三版里看到了你的铅笔字。」\\n\\n她愣了一下。然后她的表情变了——那种你曾经见过无数次的、只有一秒钟的面具掉落。\\n\\n「你一直记得？」她问。\\n\\n「一直记得。」\\n\\n她低下头，翻了一页手里的书。但你能看到她的眼眶红了。\\n\\n「你知道吗，」她终于说，声音很轻，「在霍格沃茨的七年里，我说的每一句话都是别人想听的。只有那行铅笔字，是我自己的。」\\n\\n「我知道，」你说，「所以我来找你了。」\\n\\n她抬起头看你。这一次，她没有戴面具。\\n\\n「谢谢，」她说，「谢谢你看到了。」"},lavender:{n:"拉文德·布朗",h:"格兰芬多",hc:"house-g",g:"female",s:{"loyalty": 2, "depth": 1, "bravery": 2, "rebel": 1, "humor": 2, "adventure": 2, "morals": 1, "wisdom": 0},t:["热情浪漫", "敢爱敢恨", "直球型选手", "情感充沛"],r:"她的爱是直接的、热烈的、不设防的。在人人都不敢表达的年代，她的坦率反而最珍贵。",tt:"《那些被当作傻的事》",tb:"拉文德·布朗是那种会被所有人低估的人。\\n\\n在霍格沃茨，她被归在了那个「只知道恋爱的女孩」类别里——粉红色的书包，在走廊里大声地笑，对每一个她觉得可爱的男生眨眼，在魔药课上用亮闪闪的指甲油涂她的魔杖。\\n\\n所有人都觉得她很浅。但你不这么觉得。\\n\\n你第一次注意到她，是因为一个很小的细节。\\n\\n那天她在走廊里和帕瓦蒂聊天，两个人在讨论某个人。你听到她说了一句让你很意外的话：\\n\\n「我觉得他不是因为开心才笑的，」拉文德说，声音很自然，「你注意到没有？他笑的时候左边嘴角会比右边高一点——那是不自然的笑。真正开心的时候两边是一样高的。」\\n\\n你停了一下脚步。帕瓦蒂说「你太敏感了」，然后两个人继续走了。\\n\\n但你记住了那句话。\\n\\n一个「只会谈恋爱」的女孩，注意到了别人没有注意到的微表情。一个「肤浅」的人，读出了一个微笑背后的不自然。\\n\\n这不叫肤浅。这叫敏锐。\\n\\n——\\n\\n你们真正认识，是在魔药课上。\\n\\n那天斯拉格霍恩教授让大家做一款复杂的爱情魔药——不是那种真的能让人爱上谁的药，而是一种能模拟出「被爱」时的情绪变化的药水。熬制过程需要极高的精确度，而且每一种原料的添加顺序和时机都有严格的要求。\\n\\n你坐在她的旁边。她正在往坩埚里加一种非常细小的银色粉末，她的手很稳，动作很慢，像是在做一件需要全神贯注的事。\\n\\n「你做得很好，」你低声说。\\n\\n「我知道，」她说，嘴角微微动了一下，「大家只是不想知道而已。」\\n\\n你愣了一下。「什么意思？」\\n\\n她把最后一撮粉末加进坩埚，然后转过头来看你。她的眼睛是棕色的，带着一种你以前从未在她身上看到过的认真。\\n\\n「所有人都觉得我只在乎恋爱，」她说，「所以他们从来不看我做的其他事。」\\n\\n「比如？」\\n\\n「比如我的魔药学，」她说，「这学期三次满分。比如我的魔咒，我是班里第一个做出守护神的人。比如我注意到每个人在说谎的时候都会摸鼻子——你刚才就在摸。」\\n\\n你低头看了一眼自己的手。你的食指确实搭在鼻梁上。\\n\\n你笑了。「你观察力很好。」\\n\\n「谢谢，」她说，「虽然没人想听这个。」\\n\\n——\\n\\n后来你们开始一起做作业。\\n\\n不是因为你同情她，不是因为你想要证明什么——是因为她真的很好。她的魔药学笔记比任何人的都详细，她的魔咒咒语发音是最标准的，她的论文结构是最清晰的。\\n\\n但她也真的会在走廊里大声笑，真的会在看到你喜欢的男孩的时候推你的胳膊，真的会在你难过的时候给你一个很用力的拥抱。\\n\\n「你不觉得那些行为有点……傻吗？」有一次你问她。\\n\\n「哪些行为？」\\n\\n「大声笑。推我的胳膊。在走廊里跑来跑去。所有人都觉得你很幼稚。」\\n\\n她看着你，想了一下。\\n\\n「如果我安静一点、收敛一点，」她说，「他们会觉得我不幼稚了。但如果我那样做了，那我还是我吗？」\\n\\n「可能更受人尊重。」\\n\\n「但更不快乐，」她说，「我不想变成那种受人尊重但不快乐的人。」\\n\\n你看着她。她的表情是认真的——不是那种表演给别人看的认真，是真正的、发自内心的坚定。\\n\\n「你知道吗，」你说，「你是我见过的最勇敢的人之一。」\\n\\n「为什么？」她不解。\\n\\n「因为你在一个不允许幼稚的世界里，坚持做一个幼稚的人。那不是傻，是勇敢。」\\n\\n她愣了一下。然后她做了你完全没有预料到的事——她哭了。\\n\\n不是那种嚎啕大哭，是那种突然被理解了的、止不住的眼泪。\\n\\n「你是第一个说'不是傻'的人，」她说，一边擦眼泪一边笑，「所有人都说我傻。」\\n\\n——\\n\\n战争结束后的日子里，她变了。\\n\\n不是因为那场战斗让她变得成熟——她本来就已经成熟了——而是因为她终于可以不再用「傻」来掩饰自己了。\\n\\n她在圣芒戈做了一名情绪治疗师，专门帮助那些因为战争创伤而封闭了自己的巫师。她的方法很特别——不是那种严肃的、专业的心理治疗，而是一种「让自己快乐起来」的疗法。\\n\\n「你以前教我的，」她有一次对你说，「你说在一个不允许幼稚的世界里坚持幼稚是勇敢。我把它教给了我的病人们。」\\n\\n「他们接受了？」\\n\\n「有一些接受了，」她说，「有一些还在学。」\\n\\n「你学得怎么样了？」\\n\\n她笑了。那个笑和以前一样——大声的、不收敛的、两边嘴角一样高的、真正的笑。\\n\\n「早就学会了。」"},daphne:{n:"达芙妮·格林格拉斯",h:"斯莱特林",hc:"house-s",g:"female",s:{"loyalty": 2, "depth": 3, "bravery": 1, "rebel": 1, "humor": 0, "adventure": 1, "morals": 2, "wisdom": 3},t:["冷静理性", "冰美人", "观察力强", "不轻易动心"],r:"她不会轻易对任何人敞开心扉——所以当她对你微笑的时候，你知道那意味着什么。连接是缓慢的、不可逆的。",tt:"《冰面下的温度》",tb:"达芙妮·格林格拉斯从来不做多余的事。\\n\\n在斯莱特林，她是一个安静的存在——不像潘西那样咄咄逼人，不像马尔福那样锋芒毕露。她只是坐在那里，用一种淡然的、旁观的姿态看着周围发生的一切。\\n\\n她说话的时候总是很简短，不多一个字，不少一个字。她笑的时候总是很克制，不露齿，不夸张，只是一个微小的嘴角弧度。\\n\\n所有人都觉得她很冷。\\n\\n你第一次注意到她，是因为一本笔记。\\n\\n那天你坐在图书馆的角落里，正在写魔药学的论文。你需要一个关于「月光草与夜影花混合反应」的参考资料，而你知道这本资料被很多人借过——因为它是一本非常稀有的、关于古代魔药理论的书。\\n\\n你翻了书架，没有找到。然后你注意到了坐在不远处的达芙妮。她面前摊着那本书。\\n\\n你走过去。「你在看那本关于月光草的书？」\\n\\n她抬起头看了你一眼。「嗯。」\\n\\n「你读了多久？」\\n\\n「三个小时。」\\n\\n「有什么发现？」\\n\\n「月光草的活性在满月前三天达到峰值，」她说，声音平静得像是在念一份实验报告，「不是满月当天。大多数人都搞错了。」\\n\\n你愣了一下。「那你为什么不告诉斯拉格霍恩教授？」\\n\\n「因为没有必要，」她说，「他已经很老了，不想被一个学生纠正。」\\n\\n——\\n\\n后来你开始注意到更多她「没有必要」做的事。\\n\\n你注意到她在走廊里遇到一个一年级学生迷路了，她会停下脚步，用最短的句子告诉他该往哪个方向走，然后继续走——没有多余的关心，没有安慰，但方向是对的。\\n\\n你注意到有人在魔药课上搞砸了实验，她会在课后把一张写着正确步骤的纸条放在那个人的桌上——没有署名，没有说明，只有一张纸条。\\n\\n你注意到她会在所有人离开公共休息室之后，一个人坐在壁炉前面，看着火焰，表情是安静的。不是冷漠的安静，是一种你在思考的安静。\\n\\n她的冷不是那种没有温度的冷——是那种温度被藏得很深的冷。\\n\\n——\\n\\n你真正靠近她，是因为一个冬天的夜晚。\\n\\n那天晚上你从图书馆出来，经过了斯莱特林的公共休息室。门没有完全关上，你从门缝里看到了她——她坐在壁炉前的那张沙发上，手里攥着一封信，表情是你从未在她脸上见过的东西。\\n\\n不是冷漠，不是淡然。是脆弱。\\n\\n你推开门走了进去。\\n\\n她看到你，立刻把那封信塞进了袖子里，表情恢复了那种一贯的平静。\\n\\n「你怎么在这里？」她问。\\n\\n「路过，」你说，在她旁边的沙发上坐了下来，「你还好吗？」\\n\\n「很好。」\\n\\n「那封信？」\\n\\n「没什么。」\\n\\n你沉默了一会儿。然后你站了起来，走到了壁炉前面，往里面加了一根柴。\\n\\n「火快灭了，」你说。\\n\\n她看着你，看着你往壁炉里加柴的动作，看着火光在你的脸上跳动。\\n\\n「那是阿斯托利亚的信，」她终于说，声音比平时低了很多，「她生病了。」\\n\\n阿斯托利亚是她的妹妹。你听说过那个名字——一个同样安静的、和你姐姐一样有着一双淡蓝色眼睛的女孩。\\n\\n「什么病？」你问。\\n\\n「血咒，」她说，声音很平，但你听出了那层平静下面的东西，「格林格拉斯家族的遗传。很罕见，很痛苦，而且……没有很好的治疗方法。」\\n\\n你看着壁炉里的火。火焰在柴上跳动，发出噼里啪啦的声音。\\n\\n「我能做什么？」你问。\\n\\n「陪着我，」她说，然后她立刻补充，「不用了。我自己可以——」\\n\\n「我陪你，」你说。\\n\\n她沉默了很久。然后她把那封信从袖子里拿了出来，放在膝盖上，没有拆开。\\n\\n「你知道吗，」她说，声音很轻，「所有人都觉得我不在乎任何事。」\\n\\n「他们错了。」\\n\\n「是，」她说，「但他们不需要知道。」\\n\\n「但我需要，」你说，「因为在乎你的人，也值得被在乎。」\\n\\n她把头靠在沙发背上，闭上了眼睛。火光在她的脸上跳动，她的表情是安静的——不再是那种冷漠的安静，而是一种终于可以休息一下的安静。\\n\\n「谢谢你，」她说。\\n\\n「不客气，」你说，「火还够，你可以多坐一会儿。」\\n\\n她闭着眼睛点了点头。然后你们就这样坐了很久——在壁炉前面，在火光跳动的大厅里，在没有人说话的安静的冬夜里。\\n\\n直到火焰变小了，你才站起来，又加了一根柴。"},tonks:{n:"唐克斯",h:"赫奇帕奇",hc:"house-h",g:"female",s:{"loyalty": 3, "depth": 2, "bravery": 3, "rebel": 2, "humor": 3, "adventure": 2, "morals": 2, "wisdom": 1},t:["活泼多变", "天生幽默", "勇敢无畏", "为爱勇敢"],r:"她能让你笑——在你最不想笑的时候。她的活泼不是表面的，是用笑声对抗世界的不公平。",tt:"《你不需要变得正常》",tb:"唐克斯第一次走进魔法部的傲罗办公室时，她的头发是粉色的。\\n\\n不是那种普通的、精心打理过的粉色——是那种明亮的、张扬的、像是把所有彩虹的颜色都挤进去然后只留下了最刺眼的粉红的颜色。她走进门的时候，办公室里所有人都抬起了头。\\n\\n「你就是那个新来的？」一位年长的傲罗皱着眉。\\n\\n「是！」她说，声音比正常音量高了大概两个度。她伸出手想握手，但她的头发在伸手的瞬间从粉色变成了蓝色，然后又变成绿色，最后变回了粉色。\\n\\n「我还没完全控制，」她说，有点不好意思地笑了一下，「紧张的时候会变。」\\n\\n「这可不是什么好本事。」年长的傲罗说。\\n\\n「我知道，」她说，「但我会学会的。」\\n\\n她确实学会了。在之后的几年里，她的变形能力越来越好，她的傲罗技能越来越好，她的头发变化得越来越少——不是因为控制力变强了，而是因为她学会了在紧张的时候不让它变。\\n\\n但你第一次见到她的时候，她还是一个头发会不受控制地变色的、笨拙的、笑起来声音很大的、在走廊里会被自己的脚绊倒的女孩。\\n\\n——\\n\\n你们在魔法部的走廊里认识。\\n\\n那天她抱着一摞文件，从你的对面走过来。她的头发是粉色的，但其中一缕是绿色的——像是某种还没有调整完的半成品。她走得很急，眼睛看着手里的文件而不是脚下的路。\\n\\n然后她绊到了。\\n\\n文件飞了满地。她摔在地板上，头发从粉色变成了红色，然后变成了紫色。\\n\\n你帮她把文件捡了起来。\\n\\n「谢谢！」她说，接过去的时候头发又变了一次——这次是蓝色。「我总是这样，」她说，「笨手笨脚的。对不起。」\\n\\n「你的头发为什么变色？」你忍不住问。\\n\\n「紧张，」她说，「每次尴尬的时候就会这样。我控制不了。」\\n\\n「但我觉得很酷。」\\n\\n她愣了一下。然后她的头发从蓝色变回了粉色——但这一次是那种柔和的、像是阳光照射下的花瓣的粉色。\\n\\n「你是第一个说酷的人，」她说。\\n\\n——\\n\\n后来你们一起执行任务。\\n\\n她是一个很好的傲罗——不是因为她的变形术，而是因为她有一种所有其他傲罗都没有的东西：她能用最自然的方式融入任何环境。\\n\\n她可以把头发变成任何颜色，把脸变成任何样子，但她不需要变成别人才是最厉害的——她最厉害的是，她能让每一个她接触到的人相信她是自己人。\\n\\n「你不需要变成任何别的人，」有一次你对她说，「你本来就已经够好了。」\\n\\n她看着你，表情突然变得很认真。\\n\\n「你知道吗，」她说，「所有人都觉得我的变形术是我最大的天赋。但其实不是。」\\n\\n「那是什么？」\\n\\n「是我能让人觉得自己是被接纳的，」她说，「因为我自己一直都知道不被接纳是什么感觉。我的头发会变，我的脸会变，我的身体会变——但我想让每一个和我在一起的人知道：你就是你，不需要改变。」\\n\\n——\\n\\n然后她遇到了莱姆斯·卢平。\\n\\n你看到了他们在一起的样子。她会在紧张的时候头发变成粉红色——不是因为尴尬，而是因为幸福。她会在走廊里大声笑，会在他面前毫无顾忌地做那个她本来的自己。\\n\\n你替她开心。\\n\\n然后战争来了。\\n\\n她在最后一战中倒下了。\\n\\n——\\n\\n你是在战斗结束后的废墟里找到她的。\\n\\n她躺在一片碎石旁边，头发是粉红色的——不是那种明亮的、张扬的粉，是一种柔和的、温暖的、像是夕阳最后一缕光的粉。\\n\\n她的表情是平静的。不是痛苦的，不是恐惧的。是平静的。\\n\\n你坐在她旁边，很久没有说话。\\n\\n然后你看到她的手里攥着一面小镜子——那种女巫们常用的、可以变形的便携镜。你拿起来看了看。\\n\\n镜子里映出的是你的脸。不是她的，是你的。\\n\\n你突然明白了。\\n\\n在最后的时刻，她没有变成别的样子。她变成了你的样子。\\n\\n不是因为她在模仿你，不是因为她忘记了自己——而是因为在她心里最重要的那个人，是你。\\n\\n你把那面镜子放进口袋里。然后你站起来，对着那片废墟说了一句话：\\n\\n「你从来不需要变得正常。你本来就已经够好了。」\\n\\n风从废墟的缝隙里穿过去，像是一声温柔的回应。"},fleur:{n:"芙蓉·德拉库尔",h:"布斯巴顿",hc:"house-h",g:"female",s:{"loyalty": 3, "depth": 2, "bravery": 3, "rebel": 1, "humor": 0, "adventure": 2, "morals": 2, "wisdom": 2},t:["高傲美丽", "被低估的实力", "对爱人绝对忠诚", "混血媚娃"],r:"所有人都被她的外表迷惑——但你看到了她参加三强争霸赛时的那一面。她不是花瓶，是战士。",tt:"《不是你以为的那样》",tb:"芙蓉·德拉库尔第一次走进霍格沃茨的时候，所有人都被她的外表吸引了。\\n\\n她很美——是那种不需要任何修饰、不需要任何努力就能让所有人在一瞬间注意到她的美。银色的头发，蓝色的眼睛，走路的姿势像是在跳舞。三强争霸赛宣布她作为布斯巴顿的代表参赛时，整个礼堂都安静了。\\n\\n所有人都觉得她只是一个漂亮的、被美貌宠坏了的法国女孩。\\n\\n你第一次和她说话，是在图书馆。\\n\\n那天你在找一本关于火焰咒的参考资料，在魔咒学那排的尽头看到了她。她面前摊着三本厚重的书，每一本都翻到了不同的页。她的表情是认真的——不是那种「我要在所有人面前表现得很好」的认真，是那种「这个问题真的难住我了」的认真。\\n\\n「你在查什么？」你走过去问她。\\n\\n「火焰咒的抗性，」她说，声音里带着那种法国特有的、柔软的法语腔调，「第一个任务——火龙。我需要找到一种方法，让它不会把我烧着。」\\n\\n「你已经有想法了吗？」\\n\\n「有几个，」她说，「但都不完美。」\\n\\n她给你展示了她的笔记。那不是随手写的潦草笔记——是工整的、有条理的、用三种不同颜色的笔标注的、包含了每一种可能的火焰咒变体和对应抗性方案的详细记录。\\n\\n你看着她。\\n\\n「你觉得我不像会做这种笔记的人，」她说，看着你的表情，直接说出了你的想法。\\n\\n「我……」\\n\\n「所有人都觉得我只在乎外表，」她说，合上了笔记本，「没关系。让他们觉得就好了。」\\n\\n——\\n\\n第一个任务之前，她在城堡的花园里遇到了你。\\n\\n那是初冬的一个傍晚，天空是暗紫色的，花园里的植物被一层薄霜覆盖。她站在温室的门口，手里拿着一本书，但她的眼睛没有在看书——她在看远处霍格莫德方向的灯光。\\n\\n「你紧张吗？」你走过去问她。\\n\\n「紧张，」她说，没有掩饰，「但更生气。」\\n\\n「气什么？」\\n\\n「气所有人，」她说，声音里有一种被压抑的、她不想让人听到的委屈，「所有人都觉得我只是来参赛的漂亮女孩。他们觉得我不需要努力，觉得我的美貌会自动帮我赢。但他们不知道我为了这个任务准备了多久。」\\n\\n「多久？」\\n\\n「两年，」她说，「从我被选中的那一刻开始，我就每天在练。每天。」\\n\\n她停了一下。\\n\\n「但没有人看到，」她说，「他们只看到了我的脸。」\\n\\n你站在她旁边，看着远处霍格莫德的灯光。花园里的风很冷，但温室里透出来的温暖让那片区域成了一个小小的、被保护的空间。\\n\\n「我看到了，」你说。\\n\\n她转过头看你。她的眼睛在暮色里是一种很深的蓝色，像是黑湖最深处的颜色。\\n\\n「谢谢，」她说，然后她笑了——不是那种她在所有人面前展示的、完美的、经过计算的笑，是一个带着一点点苦涩和一点点释然的笑。\\n\\n——\\n\\n第一个任务之后，她受了伤。\\n\\n不是重伤，但足够严重——火焰咒灼伤了她的左臂，需要在医疗室里治疗。所有人都来看她，但大部分人的关心都停留在「你没事吧」「好可怕」「你的手臂还好吗」的层面。\\n\\n你最后才进去。\\n\\n她坐在床边，手臂上缠着绷带，表情是疲惫的。看到你的时候，她微微笑了一下。\\n\\n「我做到了，」她说。\\n\\n「你做到了。」\\n\\n「但代价不小。」她看了一眼自己的手臂。\\n\\n「值得。」\\n\\n「为什么？」\\n\\n「因为你让他们看到了你不仅仅是漂亮的，」你说，「你在火焰里坚持了那么久，用你自己准备的咒语，完成了那个任务。这不是运气，不是美貌——这是你的能力。」\\n\\n她看着你，眼睛里的光比任何魔法灯光都要亮。\\n\\n「你知道吗，」她说，「所有人都在说我美。只有你在说我强。」\\n\\n「因为你就是。」\\n\\n她伸出手——那只没有受伤的手——轻轻握了一下你的手指。\\n\\n「Merci，」她说。法语的声音在那个安静的医疗室里听起来格外温柔。\\n\\n「什么意思？」\\n\\n「谢谢。还有——」她停了一下，「你不是你以为的那种人。你比我以为的还要好。」"},padma:{n:"帕德玛·佩蒂尔",h:"拉文克劳",hc:"house-r",g:"female",s:{"loyalty": 2, "depth": 2, "bravery": 1, "rebel": 1, "humor": 1, "adventure": 1, "morals": 2, "wisdom": 2},t:["优雅得体", "双胞胎中的理性者", "独立思考", "有分寸感"],r:"她不像姐姐那么活泼——但安静里有力量。不需要轰轰烈烈，在同一个房间做各自的事就很舒服了。",tt:"《双胞胎的另一面》",tb:"帕德玛·佩蒂尔在霍格沃茨的存在，总是和另一个人连在一起的。\\n\\n帕瓦蒂·佩蒂尔。她的双胞胎姐姐。在所有人眼里，帕瓦蒂是那个外向的、活泼的、喜欢跳舞和八卦的女孩。她是格兰芬多的人，是哈利·波特圣诞舞会的舞伴，是每一次社交活动里最活跃的那个。\\n\\n而帕德玛，是拉文克劳的那个。安静的、认真的、喜欢看书和做研究的。她不是不社交，但她的社交方式和姐姐完全不同——她更喜欢一对一的对话，更喜欢深入的讨论，更喜欢那种有实质内容的交流。\\n\\n所有人都把她们当成一个整体——「佩蒂尔双胞胎」——而不把她们当成两个独立的人。\\n\\n你第一次注意到帕德玛，是因为她在图书馆角落里做的一件事。\\n\\n那天你在找一本关于古代如尼文的书，在图书馆最里面的那一排书架间看到了她。她蹲在地上，面前摊着一本很大的如尼文字典，手里拿着一支羽毛笔，正在一个字一个字地比对。\\n\\n「你在做什么？」你走过去问。\\n\\n「翻译，」她说，头都没有抬，「有一本很老的如尼文手稿，我在试着翻译它。但有几个词的意思我不确定，所以我来查字典。」\\n\\n「你一个人？」\\n\\n「嗯，」她说，「帕瓦蒂不喜欢做这些。她更喜欢和人聊天。」\\n\\n「你不介意她那样吗？」\\n\\n帕德玛终于抬起了头。她的眼睛是深棕色的，和帕瓦蒂的一样，但眼神完全不一样——帕瓦蒂的眼睛里总是带着一种向外看的光芒，而帕德玛的眼睛里是向内看的。\\n\\n「不介意，」她说，「她是她，我是我。只是所有人都把我们当成同一个。」\\n\\n——\\n\\n后来你们开始一起做研究。\\n\\n她的研究兴趣和你出奇地合拍——你们都着迷于古代魔法和现代魔法之间的差异，都喜欢从最原始的资料开始挖掘，都喜欢那种「从一片混乱中找到一条线索」的感觉。\\n\\n「你知道吗，」有一次她对你说，那时候你们已经在图书馆里坐了四个小时了，「你是我第一个不需要解释'为什么这么无聊'就愿意和我一起做研究的人。」\\n\\n「你不觉得无聊吗？」\\n\\n「不觉得，」她说，然后她笑了——那个笑是安静的，但足够真诚，「我喜欢这些。只是没有人喜欢和我一起做。」\\n\\n「现在有了。」\\n\\n她愣了一下。然后她继续低头看她的书——但你注意到她耳朵的颜色变了一点点。\\n\\n——\\n\\n你和帕德玛之间的关系，是从研究变成朋友、从朋友变成更深的关系的。\\n\\n不是那种轰轰烈烈的变化。是缓慢的、在某一天你发现你已经在想她了的那种变化。\\n\\n你会在她常坐的那个图书馆位置上放一杯茶——不加糖，因为她不喜欢甜的东西。她会在你的论文里发现你漏掉的引用来源，用那种安静的、不让你觉得尴尬的方式指出来。你们会在霍格沃茨的走廊里并肩走着，不说话也不尴尬——因为沉默在你们之间不是空白，是一种不需要填充的东西。\\n\\n「你和我姐姐不一样，」有一次她说，「你不会觉得我不够有趣。」\\n\\n「你是有趣的，」你说，「只是你的有趣不是大声的那种。」\\n\\n「那是什么？」\\n\\n「是那种需要安静下来才能感受到的。」\\n\\n她看着你，很久没有说话。然后她把头靠在了你的肩上。\\n\\n「谢谢你，」她说，声音很轻，「谢谢你把我当成帕德玛。」\\n\\n「我从来没有把你当成别的什么人。」\\n\\n「我知道，」她说，「这就是为什么是你。」"},astoria:{n:"阿斯托利亚·格林格拉斯",h:"斯莱特林",hc:"house-s",g:"female",s:{"loyalty": 2, "depth": 3, "bravery": 2, "rebel": 1, "humor": 0, "adventure": 1, "morals": 3, "wisdom": 2},t:["温柔但有底线", "改变偏见的人", "安静的力量", "德拉科的救赎"],r:"她相信人是可以改变的——包括那些被所有人放弃的人。她的温柔不是软弱，是更深层的勇敢。",tt:"《在时间用完之前》",tb:"阿斯托利亚·格林格拉斯是那种你知道她时间不多了的人。\\n\\n不是因为她说了什么——她从来没说过——而是因为她的身体有一种不属于她的年龄的疲惫感。她的脸色总是太白了，她的动作有时候会突然停一下，像是需要多一秒来确认自己的位置。她的眼睛里有一种你很难描述的东西——不是悲伤，是一种和时间赛跑的人的平静。\\n\\n你第一次见到她，是在圣芒戈的走廊里。\\n\\n那天你去看一个受伤的同事，在经过一个单人病房的时候，从半开的门里看到了她。她坐在床上，手里拿着一本书，阳光从窗户外照进来，在她的脸上投下了一层温暖的光。\\n\\n但她的嘴唇没有血色。她的手背上插着一根细细的管子，管子连着床边的一瓶透明的药剂。\\n\\n你本来想走开的——她看起来不需要任何人的打扰——但她抬起了头，看到了你。\\n\\n「你走错房间了吗？」她问，声音很轻，但带着一种平静的、不让人尴尬的语气。\\n\\n「没有，」你说，「我来看同事，路过。」\\n\\n「那你要不要坐一会儿？」她合上书，放在腿上，「很少有人来看我。」\\n\\n——\\n\\n后来你知道了她的名字——阿斯托利亚·格林格拉斯。达芙妮·格林格拉斯的妹妹。一个因为血咒而长期住在圣芒戈的女孩。\\n\\n格林格拉斯家族的血咒是一种极其罕见的遗传病，它会缓慢地侵蚀患者的生命力，没有任何已知的根治方法。她知道自己时间不多。\\n\\n「你害怕吗？」有一次你问她。\\n\\n「有时候，」她说，靠在枕头上看着窗外的天空，「但更多的是觉得——还有很多事没做。」\\n\\n「什么事？」\\n\\n「去巴黎。读那本我攒了三年的书。学会一种乐器。看一次极光。」她笑了一下，「还有一些小事。比如在雪地里堆一个雪人。比如在海边看日出。比如……」\\n\\n她停了一下。\\n\\n「比如被一个人认真地喜欢过。」\\n\\n你没有说话。因为你知道有些话说不说，答案都是一样的。\\n\\n——\\n\\n你开始带她去那些她说想去的地方。\\n\\n不是真的去——她的身体不允许她离开圣芒戈太久——而是用魔法把那些地方搬到了她的病房里。\\n\\n你在天花板上施了一个咒语，让房间里的天空变成了巴黎的夜景。你带来了一本魔法书，那本书会自动翻页，读给她听。你在她房间的角落里放了一个小型的、会发出极光效果的魔法球。\\n\\n你在冬天的一个早晨，带了一把雪进来——用保温咒保持在融化的边缘——然后你们一起堆了一个小小的雪人。\\n\\n「这是我堆的第一个雪人，」她说，看着那个只有拳头大小的小雪人，笑了。\\n\\n「也是最后一个。」\\n\\n「最后一个也可以是最好的。」\\n\\n——\\n\\n最后一次，是在春天。\\n\\n她的身体越来越差了。她看书的时间越来越少，睡觉的时间越来越多。但你每次去看她的时候，她都是醒着的。\\n\\n「你不用每次都来，」她说。\\n\\n「我知道，」你说。\\n\\n「你每次都来，」她说，「是因为你答应过。」\\n\\n「是因为我答应过，也是因为我想要来。」\\n\\n她看着你。她的眼睛比刚认识的时候更淡了，像是一层薄雾覆盖在上面。但那种平静还在。\\n\\n「我有一个请求，」她说。\\n\\n「说。」\\n\\n「如果我走了，」她的声音很轻，像是在讨论一个和她无关的话题，「不要把我当成一个可怜的人。我是一个完成了很多事情的人。我读了很多书，我看到了巴黎的夜空，我堆了一个雪人，我……」\\n\\n她停了一下。\\n\\n「我被你认真地喜欢过。」\\n\\n你握住她的手。她的手很凉，但握得很稳。\\n\\n「我会的，」你说，「我从来就没有觉得你可怜。」\\n\\n「那就好，」她说，然后她闭上了眼睛，「那你再给我念一页书，好不好？那本我攒了三年的。」\\n\\n「好。」\\n\\n你翻开书，开始念。她的呼吸很慢，很均匀。窗外的阳光照在她脸上，是温暖的。\\n\\n你念到最后一页的时候，她睡着了。\\n\\n你没有停。你继续念，念完了整本书。\\n\\n然后你合上书，把那个小雪人放在她的枕头边。\\n\\n「你完成了，」你说。\\n\\n「所有的事。」"},susan:{n:"苏珊·博恩斯",h:"赫奇帕奇",hc:"house-h",g:"female",s:{"loyalty": 3, "depth": 1, "bravery": 2, "rebel": 0, "humor": 1, "adventure": 1, "morals": 3, "wisdom": 1},t:["善良忠诚", "赫奇帕奇的温暖", "务实的浪漫", "不张扬的勇敢"],r:"她是所有人需要帮助时第一个出现的人。她的善良不是天真——是选择。",tt:"《在最需要的时候》",tb:"苏珊·博恩斯是那种你很难第一眼就注意到的人。\\n\\n她不是赫奇帕奇最聪明的学生——那是塞德里克。她不是最外向的——那是汉娜。她不是最有天赋的——她在魔咒课上的表现一直只能算中上。\\n\\n但她是最靠谱的。\\n\\n你第一次注意到她，是因为一件事——一件很小的事。\\n\\n那天你在魔药课上搞砸了一个实验。不是那种小搞砸，是那种全班都在看你的大搞砸——你把两种不应该混合的原料加到了一起，坩埚里冒出了绿色的烟，斯拉格霍恩教授不得不走过来帮你紧急处理。\\n\\n下课后，所有人都走了。你坐在座位上，看着那个被洗干净的坩埚，心情很差。\\n\\n然后你听到身后有人说：「其实你错的那一步，我在上一次也犯过。」\\n\\n你转过头。苏珊·博恩斯站在教室门口，手里抱着几本书，表情是认真的。\\n\\n「真的？」\\n\\n「真的，」她走进来，在你的旁边坐下，「我把月光草和夜影花同时加进去了。然后整个坩埚变成了橙色。斯拉格霍恩教授当时说'博恩斯小姐，你刚才制造了一种永远不会被记录在任何书上的药剂'。」\\n\\n你忍不住笑了。\\n\\n「我是说，」她继续说，声音很认真，「你错的那一步其实很常见。很多人都会犯。你不是唯一一个。而且你犯的那一步，比大多数人的错误都更有趣——因为橙色比绿色好看多了。」\\n\\n「谢谢，」你说。\\n\\n「不客气，」她说，然后她站起来，「下次做这个实验的时候，记得先加夜影花，等三十秒再加月光草。」\\n\\n「你怎么知道？」\\n\\n「因为我犯过那个错，」她说，「所以我知道。」\\n\\n——\\n\\n从那天开始，你开始注意到苏珊身上的一个特质：她总是在最安静的时候，做最重要的事。\\n\\n她会在你找不到参考资料的时候，把正确的资料放在你的桌上，不署名。她会在你生病的时候，把你的笔记整理好送到你的宿舍。她会在考试前夜，把重点内容用一张很小的纸条总结好，塞进你的课本里。\\n\\n她做这些事的方式和她告诉你那个魔药错误的方式是一样的——不声张，不邀功，不让你觉得尴尬。\\n\\n「你为什么不告诉别人你在做这些事？」你有一次问她。\\n\\n「因为告诉别人就没意思了，」她说，一边整理她的笔记一边说，「帮助别人是为了帮助，不是为了被感谢。」\\n\\n「但你总应该得到一些认可。」\\n\\n「我做的时候就已经认可自己了，」她说，「这就够了。」\\n\\n——\\n\\n后来你们越来越熟。\\n\\n她会在图书馆里坐在你旁边，两个人安静地看书。她会在赫奇帕奇的公共休息室里帮你复习，用她那种慢条斯理但非常清晰的方式讲解每一个知识点。她会在你心情不好的时候，什么也不问，只是放一块巧克力在你的桌上。\\n\\n「你总是知道什么时候该说话什么时候不该说。」有一天你对她说。\\n\\n「因为我以前也不知道，」她说，「我以前总是说太多。后来我学会了闭嘴。」\\n\\n「什么时候学会的？」\\n\\n「在我意识到沉默比说话更有用的时候。」\\n\\n——\\n\\n战争来了。苏珊的姑母——艾米琳·博恩斯——是魔法部法律执行司的高级官员，在战争初期就被食死徒杀害了。\\n\\n你知道这个消息的时候，她在赫奇帕奇的公共休息室里，一个人坐在壁炉前面，手里攥着一封信。\\n\\n你走过去，在她旁边坐了下来。你什么都没说。\\n\\n她把头靠在了你的肩上。\\n\\n那是你第一次看到她哭。不是那种嚎啕大哭，是那种安静的、没有声音的、眼泪一滴滴掉下来的哭。\\n\\n你把手放在她的背上，轻轻地拍着。\\n\\n「她会希望你好好的。」你说。\\n\\n「我知道，」她说，声音很闷，「但我还是很难过。」\\n\\n「那就难过，」你说，「不需要忍住。」\\n\\n她哭了很久。然后她坐直了，擦了擦眼泪，深吸了一口气。\\n\\n「谢谢你，」她说，「谢谢你什么都没说。」\\n\\n「我说了。」\\n\\n「你说'不需要忍住'，」她说，「那比什么都没说更好。」\\n\\n——\\n\\n战后，她成为了圣芒戈的一名治疗师。\\n\\n你去看她的时候，她在病房里忙碌着，从一个病床走到另一个，和每一个患者说话。她的方式和她以前一模一样——安静的、不声张的、但每一次出现都是在最需要的时候。\\n\\n「你还是这样，」你说。\\n\\n「哪样？」\\n\\n「在最需要的时候出现。」\\n\\n她笑了。「那你现在需要我出现吗？」\\n\\n「一直需要。」\\n\\n「那我一直都在。」"},molly:{n:"莫丽·韦斯莱",h:"格兰芬多",hc:"house-g",g:"female",s:{"loyalty": 3, "depth": 2, "bravery": 3, "rebel": 1, "humor": 2, "adventure": 1, "morals": 3, "wisdom": 2},t:["家庭至上", "战斗型少女", "热情如火", "护短到极致"],r:"她的爱是火焰型的——烧得很旺烧得很久。她会为了保护你在任何人面前挺身而出。",tt:"《厨房里的英雄》",tb:"莫丽·韦斯莱的英雄时刻不是在战斗中出现的。\\n\\n所有人都会记得她在霍格沃茨最后一战中击败贝拉特里克斯·莱斯特兰奇的那一幕——那个为了保护女儿而爆发的、让整个战场都安静下来的咒语，那个「离我女儿远点」的怒吼。\\n\\n但在那些宏大的、被写进魔法史的时刻之外，还有一个更长的、更安静的、从未被任何人记录过的故事。\\n\\n你第一次见到莫丽·韦斯莱，是在格里莫广场12号的厨房里。\\n\\n那天你第一次来这个地方，被这栋阴暗的、到处是奇怪声响的老房子搞得浑身不自在。你在走廊里走了两圈，然后闻到了食物的味道。\\n\\n你循着味道找到了厨房。莫丽·韦斯莱站在一个巨大的、老旧的灶台前，手里拿着一把木勺，面前是三口同时冒着热气的锅。她的红头发被随意地盘在脑后，几缕碎发散落在她的脸颊旁边。她的围裙上沾着面粉和不知道什么的酱汁。\\n\\n「哦！」她看到你，立刻放下木勺，朝你走过来，「你一定饿了吧？我做了炖菜，还有面包，还有——」\\n\\n她把你推到一张桌子旁边，在面前放了一碗热气腾腾的炖菜和一块刚出炉的面包。\\n\\n「吃吧，」她说，然后回到了灶台前，继续搅拌她的三口锅。\\n\\n你低头看了看碗里的炖菜。汤的颜色是深沉的红棕色，里面有大块的土豆、胡萝卜和肉块。你尝了一口——味道好得让你想哭。\\n\\n不是因为好吃——虽然确实很好吃——是因为那种「有人在认真地照顾你」的感觉。\\n\\n——\\n\\n你开始注意到莫丽·韦斯莱的每一天。\\n\\n她每天都是第一个起床的人。你会在清晨的时候听到厨房里传来锅碗碰撞的声音和哼歌的声音。她会在所有人醒来之前把早餐准备好，把每一个人的份都摆在桌上，包括那些还没来得及到的人。\\n\\n她会在你出门之前，往你的口袋里塞一个三明治。她会在你晚归的时候，不管多晚，都在厨房里给你留一碗热汤。她会在你生病的时候，端着一碗不知道是什么但确实很有效的魔药走进来，用一种不容拒绝的语气说：「喝了它。」\\n\\n「你不需要做这些，」有一次你对她说，「我可以自己照顾自己。」\\n\\n她看了你一眼，那种「你确定？」的眼神。\\n\\n「你可以，」她说，「但有人做给你吃，和你自己做，是不一样的。」\\n\\n「有什么不一样？」\\n\\n「有人做给你吃的时候，」她停了一下，把一块饼干放在你的盘子里，「你在吃的不只是食物。」\\n\\n「还有什么？」\\n\\n「还有被爱的感觉。」\\n\\n——\\n\\n然后战争来了。她把自己的家变成了凤凰社的总部，把自己的厨房变成了所有人的补给站。\\n\\n你知道她在做什么——不仅仅是做饭。她是在用她能做的唯一一件事，在这场巨大的、她无法用魔法直接参与的战争中，找到她自己的战场。\\n\\n她的战场就是厨房。\\n\\n你有一次在深夜走进了厨房。她站在灶台前，背对着你，肩膀微微抖着。你在门口站了一会儿，然后走了进去。\\n\\n「莫丽，」你说。\\n\\n她转过身，快速地擦了一下眼睛，然后笑了——那种「我很好」的笑。\\n\\n「你饿了吗？我给你做点吃的。」\\n\\n「我不饿，」你说，「但你看起来需要有人照顾。」\\n\\n她愣了一下。然后她放下了手里的木勺，坐在了桌子旁边。你走过去，在她的对面坐了下来。\\n\\n「我怕，」她说，声音很轻，「我怕他们回不来。怕亚瑟，怕比尔，怕查理，怕弗雷德、乔治、罗恩、金妮……怕他们中的任何一个回不来。」\\n\\n「我知道，」你说。\\n\\n「但我什么都做不了，」她说，眼泪开始掉下来了，「我只能在这里做饭。做炖菜，做面包，做三明治。做这些东西有什么用？它们不能保护任何人。」\\n\\n「它们能，」你说，「每一次有人吃了你做的饭，他们就会多一分力气。不是身体上的力气——是心里的。他们知道有人在等他们回来。有人在厨房给他们留了一碗汤。有人在凌晨五点就起来给他们做早餐。这不是'什么都做不了'。这是你能做的最重要的事。」\\n\\n她看着你。然后她把头埋在双手里，哭了。\\n\\n你走过去，站在她旁边，把手放在她的肩上。\\n\\n「你不是什么都做不了，」你说，「你是一切的核心。」\\n\\n——\\n\\n弗雷德走的那天，她做了最后一顿晚餐。\\n\\n不是因为她有心情做——而是因为那是她能做的唯一的事。她站在厨房里，手里拿着木勺，面前是三口锅。她的眼睛是红的，但她的手没有停。\\n\\n你站在门口看着她。\\n\\n「莫丽。」\\n\\n「我知道，」她说，声音是平静的，「我知道他不回来了。」\\n\\n她把炖菜盛进碗里，一碗一碗地摆在桌上。每一碗前面都放了一个名字——亚瑟的、比尔的、查理的、乔治的、罗恩的、金妮的、你的。\\n\\n还有弗雷德的。\\n\\n「他那份我每天都留着，」她说，声音很轻，「因为我相信他会回来吃。」\\n\\n你没有说话。因为你没有什么话能说。\\n\\n她坐了下来，拿起勺子，开始吃。她的动作很慢，很稳。她的眼泪掉进了碗里，但她没有停。\\n\\n「吃完这顿饭，」她说，「明天我继续做。」\\n\\n——\\n\\n战争结束后的很多年里，莫丽·韦斯莱的厨房依然是所有人回来的第一个目的地。\\n\\n不是因为他们饿——是因为那是这个家里唯一不变的东西。不管外面发生了什么，不管战争有没有结束，不管大家去了哪里——莫丽的厨房里永远有一碗热汤等着他们。\\n\\n你坐在她厨房的那张桌子旁边，看着她忙碌的背影，想：这就是英雄。\\n\\n不是那种站在战场上喊口号的英雄。不是那种在史书里被写下名字的英雄。是那种在凌晨五点起来给你做早餐的、往你口袋里塞三明治的、在你生病的时候端来魔药的、在所有人离开之后依然在厨房里留着最后一碗汤的英雄。\\n\\n一个在厨房里做了一辈子炖菜的女人。\\n\\n但她让所有人都知道：有人在家等你。"},hannah:{n:"汉娜·阿博特",h:"赫奇帕奇",hc:"house-h",g:"female",s:{"loyalty": 3, "depth": 1, "bravery": 2, "rebel": 0, "humor": 2, "adventure": 1, "morals": 3, "wisdom": 1},t:["温暖治愈", "乐天派", "困难中保持善良", "破釜酒吧老板娘"],r:"她的存在本身就是治愈。在充满黑暗的世界里选择善良——不是没见过黑暗，是见过依然选择。",tt:"《你不需要完美》",tb:"汉娜·艾博是赫奇帕奇最温暖的人。\\n\\n不是那种刻意表现出来的温暖——是她骨子里就带着的那种，像是一团永远在燃烧但永远不会灼伤任何人的小火。她会在走廊里跟每一个认识的人打招呼，会在考试前给所有人带自己烤的饼干，会在你难过的时候给你一个非常用力的拥抱。\\n\\n所有人都喜欢她。\\n\\n但你注意到了一件事——在所有人喜欢的那个汉娜·艾博的背后，有一个她从来不让别人看到的角落。\\n\\n你第一次看到那个角落，是在考试之后。\\n\\n那是一年级的期末考试，魔咒课。汉娜考砸了——不是小砸，是大砸。她在施漂浮咒的时候，魔杖的角度偏了五度，结果羽毛没有飘起来，而是直接掉在了地上。\\n\\n所有人都考完了，教室里的人正在往外走。汉娜站在角落里，手里攥着她的魔杖，眼睛里含着泪水。她在拼命地忍，不想让任何人看到。\\n\\n你走过去，在她旁边坐下来。\\n\\n「我搞砸了，」她说，声音是发抖的，「我一直都在努力，但我搞砸了。」\\n\\n「只是一次考试。」\\n\\n「不，」她说，眼泪终于掉了下来，「不只是一次考试。我总是搞砸。魔药课也是，变形课也是。我不像赫敏那么聪明，不像帕瓦蒂那么好看，不像任何人那么优秀。我只是一个……普通的、什么都做不好的赫奇帕奇。」\\n\\n你看着她。\\n\\n「你知道赫奇帕奇最看重什么吗？」你问。\\n\\n她摇了摇头。\\n\\n「不是聪明，不是好看，不是优秀，」你说，「是善良。你比任何人都善良。你在走廊里跟每一个人打招呼，你给所有人带饼干，你在别人难过的时候给拥抱——这不是普通的事。这是很了不起的事。」\\n\\n「但这不是考试的加分项。」她说。\\n\\n「不是，」你说，「但这才是最重要的事。」\\n\\n她看着你，眼泪还在流，但她的嘴角微微动了一下。\\n\\n「你是第一个说'不是普通的事'的人。」\\n\\n「因为是事实。」\\n\\n——\\n\\n后来你们成了朋友。\\n\\n她会拉着你一起去厨房，从家养小精灵那里要刚出炉的饼干。她会在你生日的时候给你做一个很小、但非常可爱的蛋糕，上面写着歪歪扭扭的字。她会在你心情不好的时候，什么都不问，只是陪你去霍格莫德喝一杯黄油啤酒。\\n\\n「你总是这么开心，」有一次你对她说，「你不累吗？」\\n\\n「我有时候也累，」她说，在霍格莫德的街角停下来，看着窗外的雪，「但我觉得，如果我不开心了，那些靠着我开心起来的人怎么办？」\\n\\n「他们可以靠着自己开心起来。」\\n\\n「不是所有人都能做到。」\\n\\n「那你呢？你靠谁开心起来？」\\n\\n她愣了一下。然后她看着你。\\n\\n「你，」她说。\\n\\n「我？」\\n\\n「嗯，」她说，「只有你看到了我不开心的时候。也只有你让我觉得……我可以不完美。」\\n\\n——\\n\\n毕业后，她开了一家酒吧——破釜酒吧。\\n\\n你去看她的时候，她站在柜台后面，给每一个进来的客人倒酒。她的笑容和以前一样温暖，她的手艺比以前好了很多，她的酒吧成了对角巷最受欢迎的地方。\\n\\n「你成功了，」你说。\\n\\n「我没有搞砸？」她笑着问。\\n\\n「没有，」你说，「你从来没有搞砸过。」\\n\\n她倒了两杯黄油啤酒，一杯给自己，一杯给你。\\n\\n「敬不完美的人，」她说，举起杯子。\\n\\n「敬最温暖的人，」你说。\\n\\n你们的杯子碰在一起。清脆的声音在酒吧的喧闹中响起。\\n\\n然后她凑过来，在你的耳边轻声说了一句话：\\n\\n「谢谢你在我最不完美的时候，说'不需要完美'。」"},romilda:{n:"罗米达·万斯",h:"格兰芬多",hc:"house-g",g:"female",s:{"loyalty": 2, "depth": 1, "bravery": 3, "rebel": 2, "humor": 2, "adventure": 3, "morals": 1, "wisdom": 1},t:["大胆主动", "有冒险精神", "不服输", "直来直去"],r:"她是那种想到什么就做什么的人——不拐弯抹角，不玩心理游戏。和她的相处充满了刺激和新鲜感。",tt:"破釜酒吧的午后",tb:"罗米达·万斯的名字在霍格沃茨是一个被窃笑和翻白眼包围的笑话。\n\n不是因为她做了什么十恶不赦的事——而是因为她在情人节那天，往一盒巧克力里下了迷情剂，试图让哈利·波特爱上她。\n\n所有人都知道了。所有人都在背后议论。「那个万斯家的女孩」「给哈利下药的那个」「太疯狂了」「她以为自己是谁」。\n\n她变成了一个走廊里的笑话，一个在公共休息室被低声模仿的对象。有人说她走路的样子像一只骄傲但折了翅膀的孔雀——明明很努力保持高傲，但所有人都知道她已经在地上摔过了。\n\n但你不觉得好笑。\n\n你第一次注意到她，是在那次事件之后的魔药课上。斯拉格霍恩教授让大家做一款简单的缓和剂练习，全班都在低头忙自己的坩埚，只有她，坐在教室最角落的那个位置，低着头，一动不动。\n\n不是那种认真做药的低头。是那种「所有人都在看我但我希望他们看不到」的空洞的低头。\n\n斯拉格霍恩走到她身边，用一种过分热情的语调说：「啊，万斯小姐！我听说你对迷情剂很有研究？」全班爆发出一阵压抑的笑声。罗米达没有抬头，只是手指死死攥着搅拌棒，指节发白。\n\n那一刻你做了一个决定。\n\n下课后，你在走廊里叫住了她。\n\n「万斯。」\n\n她停下来，但没有转身。「如果你也要问我迷情剂的事，」她的声音很平，像是在背诵一段已经重复过无数遍的台词，「抱歉，无可奉告。」\n\n「不是，」你说，「你的缓和剂加错了顺序。先加月光石，再加薄荷油。你反了。」\n\n她终于转过身来看着你。那双深棕色的眼睛里有一种你很难描述的东西——不是愤怒，不是羞愧，更像是一种「终于有一个人跟我说的不是那件事」的疲惫的释然。\n\n「谢谢。」她说，然后转身走了。\n\n但你注意到，她走路的姿势和之前不太一样了。背挺得更直了一些。\n\n——\n\n从那之后，你们开始有了交集。\n\n不是那种刻意的交集。是在图书馆偶然坐在同一张桌子旁，是她做魔药时你递过去的一瓶正确的月光石粉末，是她在走廊里遇到你时不再刻意避开目光。\n\n慢慢地，你发现了一些别人没有注意到的事情。\n\n比如罗米达其实非常聪明。她不是那种靠死记硬背拿高分的学生——她有一种直觉式的理解力，能够在别人还在翻课本的时候就猜到下一步会发生什么。她的魔药成绩一直不错，只是那次迷情剂事件之后，斯拉格霍恩对她的态度变得微妙了。\n\n比如她笑起来的时候，左边脸颊有一个很浅的酒窝。这个酒窝很少有人见过，因为她在学校里几乎不笑了。但在一次你帮她在图书馆够到顶层书架上那本《高级魔药制作指南》之后，她转过头对你说「谢了」，然后那个酒窝就出现了。\n\n比如她其实很怕冷。霍格沃茨的冬天冷得刺骨，你有一次在走廊里看到她抱着双臂快步走着，手指冻得发红。第二天，你在图书馆遇到她的时候，她的桌上多了一条深红色的围巾——后来你才知道那是她自己织的，但她从来不戴在学校里，因为「别人会觉得我矫情」。\n\n你开始觉得，也许罗米达·万斯并不是所有人说的那样——一个疯狂的、不顾一切想要引起注意的女孩。也许她只是太想要被认真地看一次，而不是被当成一个笑话。\n\n——\n\n转折发生在三月的一个下午。\n\n那天你从变形课出来，在通往地下教室的楼梯转角处听到了声音。\n\n是两个拉文克劳的女生，站在楼梯平台上，声音不大不小，刚好能让路过的人听到。\n\n「你看，就是她。那个给哈利下药的。」「真的有人能做到这么不要脸吗？」「她家里人不管她的吗？」「嘘，她来了——」\n\n罗米达从另一个方向走来。她听到了。你看得出来她听到了——因为她的脚步没有停，但她的背脊绷得很紧，像是随时会断掉的弦。\n\n她没有看那两个女生，也没有看你。她就这样走过去了。\n\n但你追了上去。\n\n你在地下教室门口的走廊里拦住了她。\n\n「罗米达。」\n\n她停下来。「干什么？」\n\n「你不需要每次都忍着。」你说。\n\n「那我该干什么？」她的声音突然拔高了，「冲上去告诉她们她们是白痴吗？然后她们会说，看，她就是这样的人，疯狂、不可理喻、——」\n\n她没有说完。她的眼眶红了，但她拼命眨了眨眼，把眼泪憋了回去。\n\n「她们不是在说你，」你说，「她们只是在重复一个她们觉得好笑的故事。但你不是故事。你是罗米达。」\n\n她沉默了很久。\n\n地下教室的走廊里很安静，只有远处传来纳威的坩埚炸裂的声音和斯拉格霍恩模糊的喊叫。\n\n「你知道我为什么给哈利送巧克力吗？」她突然问。\n\n你摇了摇头。\n\n「不是因为他有多好，」她说，声音很轻，像是在对自己说，「而是因为……所有人都在看他。所有人都在说他。我想，如果他也能看我一眼，哪怕是因为一盒下了药的巧克力……至少那是一眼。」\n\n她说完就走了。走进地下教室，坐在她那个角落的位置上，从书包里取出坩埚和材料，像是刚才那段对话从来没有发生过。\n\n但你记住了。\n\n「至少那是一眼。」\n\n——\n\n考试周前的最后一个周五，你在图书馆遇到了她。\n\n她坐在靠窗的那个位置，面前摊着一本厚厚的魔药笔记，旁边放着一杯已经凉透了的南瓜汁。窗外是霍格莫德村的方向，远处的山丘被薄雾笼罩，看起来像是一幅没有上完色的水彩画。\n\n你走过去，在她对面坐下。\n\n她抬起头，看到是你，微微愣了一下。然后她继续低头看笔记。\n\n「你在复习魔药？」你问。\n\n「嗯，」她说，「斯拉格霍恩说期末考会考缓和剂的完整步骤。你知道的，他对缓和剂很执念。」\n\n你们安静地看了一会儿书。窗外传来猫头鹰拍打翅膀的声音和远处球场上追球手的呼喊。\n\n「罗米达。」你叫她的名字。\n\n「嗯？」她没有抬头。\n\n「我在看你。」\n\n她的笔尖停在了纸上。墨水洇开了一小团。\n\n她慢慢地抬起头，看着你。\n\n「什么时候开始的？」她问。\n\n「你问我迷情剂顺序反了的那天，」你说，「不对，可能更早。在魔药课上你低着头，手指攥着搅拌棒攥到指节发白的那天。」\n\n她没有说话。她的嘴唇微微动了一下，像是想说什么但又咽了回去。\n\n「你不需要一盒下了药的巧克力才能被人看见，」你说，「你站在那里，就已经有人在看你了。」\n\n窗外的雾散了一点。远处的山丘露出了一小块绿色。\n\n罗米达低下头，看着自己的笔记。然后她做了一件你完全没有预料到的事——她把笔放下，双手捂住了脸。\n\n你以为她在哭。但她没有。等她放下手的时候，她的嘴角是翘起来的。\n\n那个酒窝又出现了。\n\n「你真的很会说废话，」她说，「但……谢谢。」\n\n你们又沉默了一会儿。然后她拿起笔，在笔记上写下了一行字。你把身体探过去看——她写的是：「缓和剂：顺时针搅拌三圈半，逆时针半圈，停。加月光石，最后加薄荷油。」\n\n「你记笔记的样子像斯内普。」你说。\n\n「那是对我的最高赞美。」她回答。\n\n你笑了。她也笑了。图书馆里没有人注意到你们。\n\n——\n\n战争结束之后，你回到了霍格沃茨。\n\n学校已经开始了重建工作，城堡里到处是脚手架和修复咒的闪光。地下教室的天花板又塌了一块，斯拉格霍恩一边叹气一边用魔杖指着那些碎石，嘴里嘟囔着「我的教室我的教室我的教室」。\n\n你在走廊里遇到了罗米达。\n\n她站在一个正在被修复的拱门旁边，双手插在口袋里，深红色的围巾松松垮垮地围在脖子上——这次是在学校里戴的。\n\n「好久不见。」你说。\n\n「也不是很久，」她说，「才几个月。」\n\n「对我来说挺久的。」\n\n她看了你一会儿。然后从口袋里伸出手，手里攥着一盒巧克力。\n\n「这次没有下药。」她说，表情是那种你熟悉的、努力保持平静但其实耳朵已经红了的表情。\n\n你接过巧克力，打开盒子。里面是六块手工巧克力，形状不是很规则，一看就是自己做的。\n\n「我学的，」她说，「不是迷情剂。是正常的巧克力。我练了很久。」\n\n你拿起一块放进嘴里。很甜，带一点苦，巧克力味很浓，但有一块的外壳裂了，里面的馅料漏出来一点。\n\n「第三块做得不太好，」你说，「外壳裂了。」\n\n「我知道，」她有些不好意思地说，「温度没控好。但我还在练。」\n\n你看着她，看着她的深红色围巾，看着她那个因为不好意思而越来越明显的酒窝，看着她那双终于不再空洞的、明亮的深棕色眼睛。\n\n「不用练了，」你说，「已经很好了。」\n\n她眨了眨眼。眼眶有点红，但她没有忍住。\n\n「你知道吗，」她说，声音轻得像走廊里的穿堂风，「我以前觉得，如果所有人都看我，那一定是因为我做了什么惊天动地的事。哪怕是坏事，至少他们看我了。」\n\n她停了一下。\n\n「但现在我知道，被一个人认真地看，比被所有人看都重要。」\n\n你拉起她的手。她的手很暖，不再是那个冬天在走廊里冻得发红的人了。\n\n「我还在看你，」你说，「以后也会。」\n\n她没有说话。她把头靠在你的肩膀上，就在那个正在被修复的拱门旁边，在满是碎石和脚手架的走廊里。\n\n远处传来修复咒的闪光，一下、两下，像是在给这个场景打光。\n\n你们就这样站了很久。不需要更多的话。也不需要更多的话。\n\n因为「至少那是一眼」的下一句，是「而这一个眼神，就是一切」。\n\n——\n\n后来，罗米达成为了圣芒戈最年轻的魔药师之一。她专攻心理治疗类魔药，尤其是那些被大众误解和污名化的患者。有一次，一个年轻的女巫因为感情失败而试图用迷情剂挽回男友，被送到了圣芒戈。所有人都觉得她是个笑话。\n\n罗米达是唯一一个没有笑的人。\n\n她坐在那个女孩的床边，用一种只有经历过的人才懂的语气说：「我知道你只是想要被看见。但你不需要下药。」\n\n那个女孩哭了。罗米达陪了她一个下午。\n\n后来那个女孩康复出院，给罗米达写了一封感谢信。信里有一句话，罗米达一直留着：「你是第一个认真看我的人。」\n\n而你知道，这一切的起点，不过是一个在魔药课上低着头、手指攥着搅拌棒攥到指节发白的下午。\n\n你第一次认真地看她的下午。\n\n也是她第一次被人认真地看的下午。\n\n"}};
const QS=[{"t": "分院帽在你头上犹豫了很久，最终没有立刻喊出学院名字。你觉得它犹豫的原因最可能是什么？", "o": [{"t": "它看到了我内心深处的忠诚，但也看到了我对规则的质疑", "s": {"loyalty": 2, "rebel": 1}}, {"t": "它不确定我是勇敢还是鲁莽", "s": {"bravery": 2, "wisdom": 1}}, {"t": "它觉得我属于一个不太被看好的学院，但那里才是我该去的地方", "s": {"depth": 2, "morals": 1}}, {"t": "它在我脑子里看到了太多矛盾的东西，无法归类", "s": {"wisdom": 2, "depth": 1}}]}, {"t": "如果博格特出现在你面前，你觉得它会变成什么？", "o": [{"t": "我辜负了某个最信任我的人的样子", "s": {"loyalty": 3, "depth": 1}}, {"t": "我变得和我最讨厌的人一模一样", "s": {"rebel": 2, "morals": 2}}, {"t": "一个我没能救回来的人", "s": {"bravery": 2, "depth": 2}}, {"t": "我孤独地坐在一个没有人记得我的地方", "s": {"loyalty": 1, "depth": 2}}]}, {"t": "斯拉格霍恩教授的鼻涕虫俱乐部邀请了你，你会怎么做？", "o": [{"t": "去，认识有影响力的人没有坏处", "s": {"wisdom": 2, "adventure": 1}}, {"t": "不去，我不喜欢被当作某种资源来利用", "s": {"rebel": 2, "morals": 1}}, {"t": "去，但我只关注我真正感兴趣的人", "s": {"wisdom": 2, "depth": 1}}, {"t": "去，说不定能结交到有趣的人", "s": {"adventure": 2, "humor": 1}}]}, {"t": "你在有求必应屋里发现了一本古老的魔法书，封面上写着「危险但值得」，你会怎么做？", "o": [{"t": "翻开它——危险的东西往往藏着最有价值的知识", "s": {"adventure": 2, "wisdom": 1}}, {"t": "先检查有没有黑魔法痕迹再决定", "s": {"wisdom": 3, "morals": 1}}, {"t": "把它交给教授处理", "s": {"morals": 2, "loyalty": 1}}, {"t": "带走但暂时不看，等找到值得信任的人一起研究", "s": {"loyalty": 2, "wisdom": 1}}]}, {"t": "魁地奇世界杯上，食死徒在营地闹事。你会怎么做？", "o": [{"t": "拿出魔杖准备战斗", "s": {"bravery": 3, "loyalty": 1}}, {"t": "先找到身边的朋友确保他们安全", "s": {"loyalty": 3, "wisdom": 1}}, {"t": "用幻影移形带附近的人离开", "s": {"bravery": 2, "wisdom": 1}}, {"t": "记录发生了什么——这些暴行需要被记住", "s": {"depth": 2, "morals": 1}}]}, {"t": "邓布利多军第一次集会，你被分到了一个两人练习小组，你最希望搭档是什么样的人？", "o": [{"t": "比我强的人——可以从他身上学到东西", "s": {"wisdom": 2, "adventure": 1}}, {"t": "和我水平差不多的人——一起进步", "s": {"loyalty": 1, "depth": 1}}, {"t": "比我弱的人——我可以教他", "s": {"loyalty": 2, "morals": 1}}, {"t": "不管是谁都行，重要的是我们都能学会", "s": {"humor": 1, "wisdom": 1}}]}, {"t": "三强争霸赛的圣诞舞会即将到来，你最在意的是什么？", "o": [{"t": "和谁一起去——那个人对我来说很重要", "s": {"loyalty": 2, "depth": 1}}, {"t": "舞会本身有什么好玩的", "s": {"adventure": 2, "humor": 1}}, {"t": "会不会在舞会上遇到其他学校的有趣的人", "s": {"adventure": 2, "wisdom": 1}}, {"t": "说实话我不太想去人多的地方", "s const D=['loyalty','depth','bravery','rebel','humor','adventure','morals','wisdom'];
let qi=0,sc={},cqs=[];
function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function start(){
    document.getElementById('intro').classList.remove('active');
    document.getElementById('quiz').classList.add('active');
    let genderQs=QS.filter(q=>q.o[0]&&q.o[0].s&&q.o[0].s._sel);
    let normalQs=QS.filter(q=>!(q.o[0]&&q.o[0].s&&q.o[0].s._sel));
    let picked=sh(genderQs).slice(0,2);
    picked=picked.concat(sh(normalQs).slice(0,8));
    cqs=sh(picked);
    sc={};D.forEach(d=>sc[d]=0);window._gm=0;window._gf=0;qi=0;showQ();
}
function showQ(){
    let q=cqs[qi];
    document.getElementById('qt').textContent=q.t;
    document.getElementById('pb').style.width=(qi/10*100)+'%';
    document.getElementById('qn').textContent='第'+(qi+1)+'/10题';
    let od=document.getElementById('os');od.innerHTML='';
    let so=sh(q.o);
    so.forEach(opt=>{
        let b=document.createElement('button');b.className='opt';b.textContent=opt.t;
        b.onclick=()=>pick(opt.s,b);od.appendChild(b);
    });
    let c=document.getElementById('qc');c.classList.remove('fi');void c.offsetWidth;c.classList.add('fi');
}
function pick(s,btn){
    document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    for(let k in s){
        if(k==='_sel'){
            if(s[k]==='m')window._gm=(window._gm||0)+1;
            else if(s[k]==='f')window._gf=(window._gf||0)+1;
        }else{
            sc[k]=(sc[k]||0)+s[k];
        }
    }
    setTimeout(()=>{qi++;if(qi>=10)calc();else showQ()},400);
}
function calc(){
    document.getElementById('quiz').classList.remove('active');
    document.getElementById('loading').classList.add('active');
    setTimeout(()=>{
        let gm=window._gm||0,gf=window._gf||0;
        let tg=gm>gf?'female':gm<gf?'male':(Math.random()>0.5?'male':'female');
        let best=null,bs=0;
        for(let id in CHARS){
            let c=CHARS[id];
            if(c.g!==tg)continue;
            let tot=0,w=0;
            for(let d of D){let cw=c.s[d]||0;let uw=sc[d]||0;tot+=cw*uw;w+=cw;}
            let pct=w>0?Math.round(tot/w/3*100):Math.round(Math.random()*30+50);
            pct=Math.min(98,Math.max(45,pct));
            if(pct>bs){bs=pct;best={id,...c}}
        }
        if(!best){best={...CHARS['snape_m']};bs=78;best.id='snape_m';}
        showR(best,bs);
    },2500);
}
function showR(c,pct){
    document.getElementById('loading').classList.remove('active');
    document.getElementById('result').classList.add('active');
    let h='';
    h+='<div class="mpct">'+pct+'%</div>';
    h+='<div class="mlbl">命运羁绊匹配度</div>';
    h+='<div class="cname">'+c.n+'</div>';
    h+='<div class="'+c.hc+'">'+c.h+'</div>';
    h+='<div class="trs">'+c.t.map(t=>'<span class="tr">'+t+'</span>').join('')+'</div>';
    h+='<div style="margin:20px 0;color:#c4a882;line-height:1.8;font-size:1rem">'+c.r+'</div>';
    if(c.tb){
        h+='<div class="story">';
        h+='<div class="stitle">'+c.tt+'</div>';
        c.tb.split('\\n').forEach(p=>{if(p)h+='<p style="margin-bottom:15px">'+p+'</p>';});
        window._cs=c.tb;
        window._cn=c.n;
        window._ct=c.tt;
        h+='<div class="cpbtn" id="cpbtn">📋 复制故事，去小红书分享</div>';
        h+='</div>';
    }
    document.getElementById('rc').innerHTML=h;
    let btn=document.getElementById('cpbtn');
    if(btn)btn.onclick=copyStory;
}
function copyStory(){
    let body=window._cs||'';
    let name=window._cn||'';
    let title=window._ct||'';
    let txt='🕯️ 哈利波特角色匹配测试\n\n我匹配到了'+name+'！\n\n'+title+'\n\n'+body.replace(/\\n/g,'\n')+'\n\n—— 测测你匹配到了谁？👆';
    if(navigator.clipboard){
        navigator.clipboard.writeText(txt).then(()=>{
            let b=document.getElementById('cpbtn');
            if(b){b.textContent='✅ 已复制！快去小红书分享吧';setTimeout(()=>{b.textContent='📋 复制故事，去小红书分享';},3000);}
        });
    }else{
        let ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);
        ta.select();document.execCommand('copy');document.body.removeChild(ta);
        let b=document.getElementById('cpbtn');
        if(b){b.textContent='✅ 已复制！快去小红书分享吧';}
    }
}
function restart(){
    document.getElementById('result').classList.remove('active');
    document.getElementById('intro').classList.add('active');
}

    let c=document.getElementById('stars');
    for(let i=0;i<80;i++){
        let s=document.createElement('div');s.className='star';
